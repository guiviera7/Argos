          span.className = 'pik-thr-val'; span.textContent = cur;
          inp.replaceWith(span);
        }
      });
    }

    function calcUnidades(material, nome, estoqueKg) {
      const sufixo = String(material || '').slice(-3);
      if (!sufixo || estoqueKg == null || estoqueKg <= 0) return null;
      let peso;
      if (sufixo === '595') {
        const nomeNorm = normStr(nome || '');
        let found = null;
        for (const [aroma, p] of AROMA_PESOS_SORTED) {
          if (nomeNorm.includes(normStr(aroma))) { found = p; break; }
        }
        peso = found !== null ? found : AROMA_DEFAULT;
      } else {
        peso = UNIT_PESOS[sufixo];
      }
      if (!peso) return null;
      return Math.floor(estoqueKg / peso);
    }
    function softgelTag(material, nome, estoqueKg, cls) {
      const un = calcUnidades(material, nome, estoqueKg);
      if (un === null) return '';
      return `<span class="tt-tag softgel-un${cls ? ' ' + cls : ''}">≈ ${un.toLocaleString('pt-BR')} un</span>`;
    }
    // Compat legado (sem nome)
    function softgelUnidades(material, estoqueKg) { return calcUnidades(material, '', estoqueKg); }

    /* ═══════════════════════════════════════════════════
     * TOOLTIP DO MAPA
     * ═══════════════════════════════════════════════════ */
    const _tt = document.getElementById('palletTooltip');

    function showTooltip(e, posicao, rows) {
      const itemsHtml = rows.map(r => {
        const days = daysUntil(r.data_vencimento);
        let vencTag = '';
        if (days !== null) {
          const cls = days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const label = days < 0
            ? `Vencido há ${Math.abs(days)}d`
            : days === 0 ? 'Vence hoje'
              : `Vence em ${days}d`;
          vencTag = `<span class="tt-tag ${cls}">${label} (${fmtDate(r.data_vencimento)})</span>`;
        }
        return `<div class="tt-item">
      <div class="tt-mat">${esc(r.material)}</div>
      <div class="tt-nome">${esc(r.nome)}</div>
      <div class="tt-row">
        <span class="tt-tag">Lote: ${esc(r.lote || '—')}</span>
        <span class="tt-tag">${fmt(r.estoque)} kg</span>
        ${vencTag}
      </div>
    </div>`;
      }).join('');
      _tt.innerHTML = `<div class="tt-pos">${esc(posicao)}</div>${itemsHtml}`;
      _showTT();
      moveTooltip(e);
    }

    function showPesTooltip(e, posicao, rows) {
      const total = rows.reduce((s, r) => s + (r.estoque || 0), 0);
      const itemsHtml = rows.map(r => {
        const d = r.data_vencimento ? new Date(r.data_vencimento) : null;
        const days = daysUntil(d);
        let vencTag = '';
        if (days !== null) {
          const cls = days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const label = days < 0 ? `Vencido há ${Math.abs(days)}d` : days === 0 ? 'Vence hoje' : `Vence em ${days}d`;
          vencTag = `<span class="tt-tag ${cls}">${label} (${fmtDate(d)})</span>`;
        }
        const pikData = getPikInfo(r.material);
        const pikTag = pikTagHtml(pikData, 'tt-tag');
        return `<div class="tt-item">
      <div class="tt-mat">${esc(r.material)}</div>
      <div class="tt-nome">${esc(r.nome)}</div>
      <div class="tt-row">
        <span class="tt-tag">Lote: ${esc(r.lote || '—')}</span>
        <span class="tt-tag">${fmt(r.estoque)} kg</span>
        ${softgelTag(r.material, r.nome, r.estoque, 'tt-tag')}
        ${vencTag}
      </div>
      <div class="tt-row">${pikTag}</div>
    </div>`;
      }).join('');
      _tt.innerHTML = `<div class="tt-pos">${esc(posicao)}</div>
    ${rows.length > 1 ? `<div style="font-size:10px;color:var(--warning);margin-bottom:4px;font-weight:700">Total: ${fmt(total)} kg</div>` : ''}
    ${itemsHtml}`;
      _showTT();
      moveTooltip(e);
    }
    function moveTooltip(e) {
      if (!_ttVisible) return;
      let x = e.clientX + 14, y = e.clientY + 14;
      const w = _tt.offsetWidth || 260, h = _tt.offsetHeight || 150;
      if (x + w > window.innerWidth - 10) x = e.clientX - w - 10;
      if (y + h > window.innerHeight - 10) y = e.clientY - h - 10;
      _tt.style.left = x + 'px'; _tt.style.top = y + 'px';
    }
    function hideTooltip() { _ttVisible = false; _tt.style.display = 'none'; }
    function _showTT() { _ttVisible = true; _tt.style.display = 'block'; }
    document.addEventListener('mousemove', moveTooltip, { passive: true });

    /* ── Family threshold pills ── */
    function renderFamThreshPills() {
      const wrap = document.getElementById('famThreshWrap');
      if (!wrap) return;
      wrap.innerHTML = FAMILY_DEFS.map(f => {
        const thr = state.familyThresholds[f.key];
        return `<div class="fam-thresh-pill" data-fkey="${f.key}" onclick="editFamThresh('${f.key}',this)">
      <span>${f.label}</span>
      <span class="fam-thresh-sep">≤</span>
      <span class="fam-thresh-val" id="ftv-${f.key}">${thr}</span><span style="color:var(--text-muted)">kg</span>
    </div>`;
      }).join('');
    }
    function editFamThresh(key, el) {
      if (el.classList.contains('editing')) return;
      el.classList.add('editing');
      const valEl = el.querySelector('.fam-thresh-val');
      const cur = state.familyThresholds[key];
      const inp = document.createElement('input');
      inp.type = 'number'; inp.min = 0; inp.step = 0.1; inp.value = cur;
      inp.className = 'fam-thresh-inp';
      valEl.replaceWith(inp);
      inp.focus(); inp.select();
      const commit = () => {
        el.classList.remove('editing');
        const v = Math.max(0, parseFloat(inp.value) || 0);
        state.familyThresholds[key] = v;
        const span = document.createElement('span');
        span.className = 'fam-thresh-val'; span.id = 'ftv-' + key; span.textContent = v;
        inp.replaceWith(span);
        renderAll();
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') {
          el.classList.remove('editing');
          const span = document.createElement('span');
          span.className = 'fam-thresh-val'; span.id = 'ftv-' + key; span.textContent = cur;
          inp.replaceWith(span);
        }
      });
    }

      return [...new Set(arr.filter(v => v !== '' && v !== null && v !== undefined))].sort((a, b) => {
        if (typeof a === 'number' && typeof b === 'number') return a - b;
        return String(a).localeCompare(String(b));
      });

        if (String(v) === String(cur)) o.selected = true;
        sel.appendChild(o);
      });

     * DASHBOARD
     * ═══════════════════════════════════════════════════ */
    function renderDashboard() {

      const uniqueMat = new Set(estoque.map(r => r.material).filter(Boolean)).size;
      const uniquePos = new Set(estoque.map(r => r.posicao).filter(Boolean)).size;

      const criticas = Object.entries(pikTotais).filter(([pos, t]) => {

        return t <= thr && t >= 0;
      }).length;
      set('d-total-mat', uniqueMat || '—');

      set('d-picking', picking.length || '—');
      set('d-picking-sub', picking.length ? `${picking.length} registros` : 'Aguardando importação');
      set('d-criticas', criticas || (picking.length ? '0' : '—'));
      set('d-criticas-sub', picking.length ? 'por família' : 'No picking');
      set('badge-estoque', estoque.length);
      set('badge-picking', picking.length);

    /* ═══════════════════════════════════════════════════
     * AUTOCOMPLETE — MATERIAL / NOME
     * ═══════════════════════════════════════════════════ */
    function _rebuildSuggestCache() {
      const today = new Date();
      const critSeen = new Set(), lowSeen = new Set();
      _suggestCrit = []; _suggestLow = [];
      state.estoque.forEach(r => {
        if (critSeen.has(r.material)) return;
        const d = r.data_vencimento;
        if (!d) return;
        const days = Math.floor((d - today) / 86400000);
        if (days <= 30) { critSeen.add(r.material); _suggestCrit.push({ material: r.material, nome: r.nome, days, _norm: r._normSearch }); }
      });
      _suggestCrit.sort((a, b) => a.days - b.days);
      state.picking.forEach(r => {
        if (lowSeen.has(r.material)) return;
        if (r.estoque <= state.threshold && r.estoque >= 0) {
          lowSeen.add(r.material);
          if (!critSeen.has(r.material)) _suggestLow.push({ material: r.material, nome: r.nome, _norm: r._normSearch });
        }
      });
    }
    function renderSuggest(query) {
      const wrap = document.getElementById('suggestDropdown');
      if (!wrap || !state.estoque.length) { wrap && wrap.classList.remove('open'); return; }

      const q = normStr(query);
      const match = item => !q || item._norm.includes(q);
      const fc = _suggestCrit.filter(match).slice(0, 6);
      const fl = _suggestLow.filter(match).slice(0, 6);

      if (!fc.length && !fl.length) { wrap.classList.remove('open'); return; }

      let html = '';
      if (fc.length) {
        html += `<div class="suggest-group"><div class="suggest-group-label">⚠️ Críticos</div>`;
        fc.forEach(item => {
          const label = item.days < 0 ? `vencido ${Math.abs(item.days)}d` : `vence ${item.days}d`;
          html += `<div class="suggest-item" onmousedown="selectSuggest(${JSON.stringify(item.material)})">
        <span class="suggest-mat">${esc(item.material)}</span>
        <span class="suggest-nome">${esc(item.nome)}</span>
        <span class="suggest-tag crit">${label}</span>
      </div>`;
        });
        html += '</div>';
      }
      if (fl.length) {
        html += `<div class="suggest-group"><div class="suggest-group-label">📉 Estoque baixo</div>`;
        fl.forEach(item => {
          html += `<div class="suggest-item" onmousedown="selectSuggest(${JSON.stringify(item.material)})">
        <span class="suggest-mat">${esc(item.material)}</span>
        <span class="suggest-nome">${esc(item.nome)}</span>
        <span class="suggest-tag low">PIK baixo</span>
      </div>`;
        });
        html += '</div>';
      }
      wrap.innerHTML = html;
      wrap.classList.add('open');
    }
    function selectSuggest(material) {
      const inp = document.getElementById('f-material');
      if (inp) inp.value = material;
      document.getElementById('suggestDropdown').classList.remove('open');
      renderPesView();
    }
    function closeSuggest() {
      setTimeout(() => {
        const w = document.getElementById('suggestDropdown');
        if (w) w.classList.remove('open');
      }, 150);
    }

    /* ═══════════════════════════════════════════════════
     * MAPA VISUAL PES
     * ═══════════════════════════════════════════════════ */
    /* ═══════════════════════════════════════════════════
     * PES SUB-TABS
     * ═══════════════════════════════════════════════════ */
    const FIXED_PES_CORREDORES = new Set(['J', 'K']);
    const FIXED_PES_POSITIONS = new Set(['CORAN-021', 'AJUSTE']);

    function buildPesSubtabs() {
      const tabsEl = document.getElementById('pes-subtabs');
      if (!tabsEl) return;
      // Detectar posições dinâmicas (não J, K, CORAN-021, AJUSTE)
      const outras = [...new Set(
        state.estoque
          .filter(r => !FIXED_PES_CORREDORES.has(r.corredor) && !FIXED_PES_POSITIONS.has(r.posicao))
          .map(r => r.posicao)
          .filter(Boolean)
      )].sort();
      const hasCoran = state.estoque.some(r => r.posicao === 'CORAN-021');
      const hasAjuste = state.estoque.some(r => r.posicao === 'AJUSTE');
      let tabs = [{ id: 'jk', label: 'Corredores J/K' }];
      if (hasCoran) tabs.push({ id: 'coran-021', label: 'CORAN-021' });
      if (hasAjuste) tabs.push({ id: 'ajuste', label: 'AJUSTE' });
      outras.forEach(pos => tabs.push({ id: pos, label: pos }));
      tabsEl.innerHTML = tabs.map(t =>
        `<button class="pes-subtab${state.pesSubtab === t.id ? ' active' : ''}" onclick="setPesSubtab('${esc(t.id)}')">${esc(t.label)}</button>`
      ).join('');
    }

    function setPesSubtab(id) {
      state.pesSubtab = id;
      state.pesTabSort = 'mais_velho';
      state.pesTabModo = 'normal';
      state.pesTabFiltroVenc = '';
      renderMapaPES();
    }

    function setPesTabSort(v) { state.pesTabSort = v; renderMapaPES(); }
    function setPesTabModo(v) { state.pesTabModo = v; renderMapaPES(); }
    function setPesTabFiltroVenc(v) { state.pesTabFiltroVenc = v; renderMapaPES(); }

    function renderMapaPES() {
      const container = document.getElementById('estoque-content');
      const meta = document.getElementById('meta-estoque');
      buildPesSubtabs();

      if (!state.estoque.length) {
        meta.textContent = '';
        container.innerHTML = `<div class="prompt-filtro"><div class="prompt-ico">📂</div><p>Nenhum dado de estoque importado.</p><small>Importe o CSV do PES acima.</small></div>`;
        document.getElementById('mapa-view-toggle').style.display = 'none';
        return;
      }
      meta.textContent = '';

      // Filtros de busca para highlight no mapa
      const f = getEstoqueFilters();
      const searchTerm = (f.material || '').toLowerCase();

      // Sub-tab ativa
      const sub = state.pesSubtab;
      const isJK = sub === 'jk';
      document.getElementById('mapa-view-toggle').style.display = isJK ? '' : 'none';

      if (!isJK) {
        // Abas especiais: CORAN-021, AJUSTE, ou posição dinâmica
        const posicao = sub === 'coran-021' ? 'CORAN-021' : sub === 'ajuste' ? 'AJUSTE' : sub;
        const rows = state.estoque.filter(r => r.posicao === posicao);
        container.innerHTML = buildSpecialTabSection(posicao, rows, searchTerm);
        // Registrar no posDataMap para os event listeners
        _posDataMap.clear();
        rows.forEach(r => {
          if (!_posDataMap.has(r.posicao)) _posDataMap.set(r.posicao, []);
          _posDataMap.get(r.posicao).push(r);
        });
        attachPesEvents(container);
        return;
      }

      // ─── Aba JK ───
      const corrJ = state.estoque.filter(r => r.corredor === 'J' && r.nivel !== 1);
      const corrK = state.estoque.filter(r => r.corredor === 'K' && r.nivel !== 1);
      const corrJn1 = state.estoque.filter(r => r.corredor === 'J' && r.nivel === 1);
      const corrKn1 = state.estoque.filter(r => r.corredor === 'K' && r.nivel === 1);

      let html = `<div class="mapa-legenda">
    <span style="font-size:11px;color:var(--text-muted);font-weight:600;margin-right:4px">Legenda:</span>
    <span class="legenda-item"><span class="legenda-dot ok"></span>Estoque ok</span>
    <span class="legenda-item"><span class="legenda-dot warn"></span>Vence em ≤30 dias</span>
    <span class="legenda-item"><span class="legenda-dot crit"></span>Vencido / zerado</span>
    <span class="legenda-item"><span class="legenda-dot empty"></span>Vaga vazia</span>
  </div>`;

      if (_fefoDirty) { _fefoCache = computeFefo(state.estoque); _fefoDirty = false; }
      const fefoMap = _fefoCache;
      state.fefoMap = fefoMap;
      if (state.mapaView === 'preress') {
        html += buildN1Section(corrJn1, corrKn1, searchTerm, fefoMap);
      } else if (state.mapaView === 'expandida') {
        html += buildCorredorExpandido('J', corrJ, searchTerm, fefoMap);
        html += buildCorredorExpandido('K', corrK, searchTerm, fefoMap);
      } else {
        html += buildCorredorCompacta('J', corrJ, searchTerm, fefoMap);
        html += buildCorredorCompacta('K', corrK, searchTerm, fefoMap);
      }

      // Armazenar dados no posDataMap para event delegation
      _posDataMap.clear();
      const allSections = [corrJ, corrK, corrJn1, corrKn1];
      allSections.forEach(arr => arr.forEach(r => {
        if (!_posDataMap.has(r.posicao)) _posDataMap.set(r.posicao, []);
        _posDataMap.get(r.posicao).push(r);
      }));

      container.innerHTML = html;
      attachPesEvents(container);
    }

    function attachPesEvents(container) {
      if (container._pesEventsAttached) return;
      container._pesEventsAttached = true;
      let _matHlTimer = null;
      container.addEventListener('click', e => {
        const cell = e.target.closest('[data-posicao]');
        if (!cell) return;
        e.stopPropagation();
        hideTooltip();
        if (cell.classList.contains('n1-row')) {
          const wrap = cell.parentElement;
          const expand = wrap && wrap.querySelector('.n1-expand');
          if (expand) {
            const isOpen = expand.classList.contains('open');
            expand.classList.toggle('open', !isOpen);
            cell.classList.toggle('expanded', !isOpen);
          }
        } else if (cell.dataset.empty === '1') {
          showEmptyDetailPopup(cell.dataset.posicao, cell);
        } else if (cell.dataset.rows) {
          showDetailPopup(cell.dataset.posicao, JSON.parse(cell.dataset.rows), cell);
        }
      });
      container.addEventListener('mouseover', e => {
        const cell = e.target.closest('[data-posicao][data-rows]');
        if (!cell || cell.classList.contains('n1-row') || cell._ttBound) return;
        cell._ttBound = true;
        const posicao = cell.dataset.posicao;
        const rows = JSON.parse(cell.dataset.rows);
        showPesTooltip(e, posicao, rows);
        const onLeave = () => { hideTooltip(); cell.removeEventListener('mouseleave', onLeave); cell._ttBound = false; };
        cell.addEventListener('mouseleave', onLeave);
      });
      container.addEventListener('mouseover', e => {
        const row = e.target.closest('.n1-row[data-material]');
        if (!row || row._hlBound) return;
        if (state.mapaView === 'preress') return;
        row._hlBound = true;
        const material = row.dataset.material;
        clearTimeout(_matHlTimer);
        _matHlTimer = setTimeout(() => {
          container.classList.add('has-mat-hl');
          container.querySelectorAll(`[data-material="${CSS.escape(material)}"]`).forEach(c => c.classList.add('mat-match'));
        }, 500);
        const onLeave = () => {
          clearTimeout(_matHlTimer);
          container.classList.remove('has-mat-hl');
          container.querySelectorAll('.mat-match').forEach(c => c.classList.remove('mat-match'));
          row.removeEventListener('mouseleave', onLeave); row._hlBound = false;
        };
        row.addEventListener('mouseleave', onLeave);
      });
    }

    /* ═══════════════════════════════════════════════════
     * SEÇÃO DE ABA ESPECIAL (CORAN-021, AJUSTE, outras posições)
     * ═══════════════════════════════════════════════════ */
    function buildSpecialTabSection(posicao, rows, searchTerm) {
      if (!rows.length) {
        return `<div style="padding:24px 0;text-align:center;color:var(--text-muted)">
      Nenhum material na posição <strong>${esc(posicao)}</strong>.</div>`;
      }

      const { pesTabSort, pesTabModo, pesTabFiltroVenc } = state;

      let filtered = [...rows];
      if (pesTabFiltroVenc === 'proximos') {
        filtered = filtered.filter(r => { const d = daysUntil(r.data_vencimento); return d !== null && d >= 0 && d <= 30; });
      } else if (pesTabFiltroVenc === 'vencidos') {
        filtered = filtered.filter(r => { const d = daysUntil(r.data_vencimento); return d !== null && d < 0; });
      }
      if (searchTerm) {
        filtered = filtered.filter(r => r._normSearch && r._normSearch.includes(searchTerm));
      }

      let cardsHtml = '';
      if (pesTabModo === 'organizada') {
        const grupos = {};
        filtered.forEach(r => {
          const g = String(r.material || '').slice(-3) || '???';
          if (!grupos[g]) grupos[g] = [];
          grupos[g].push(r);
        });
        cardsHtml = Object.keys(grupos).sort().map(g => {
          const gRows = [...grupos[g]].sort((a, b) => {
            const da = a.data_vencimento ? a.data_vencimento.getTime() : Infinity;
            const db = b.data_vencimento ? b.data_vencimento.getTime() : Infinity;
            return da - db;
          });
          return `<div class="mat-card-group">
        <div class="mat-card-group-header">Grupo ${esc(g)} — ${gRows.length} item${gRows.length !== 1 ? 's' : ''}</div>
        <div class="mat-card-grid">${gRows.map(r => buildSpecialTabCard(r, searchTerm)).join('')}</div>
      </div>`;
        }).join('');
      } else {
        filtered.sort((a, b) => {
          const da = a.data_entrada ? a.data_entrada.getTime() : 0;
          const db = b.data_entrada ? b.data_entrada.getTime() : 0;
          return pesTabSort === 'mais_velho' ? da - db : db - da;
        });
        cardsHtml = `<div class="mat-card-grid">${filtered.map(r => buildSpecialTabCard(r, searchTerm)).join('')}</div>`;
      }

      const semEnd = rows.filter(r => { const d = daysAgo(r.data_entrada); return d !== null && d > 7; });
      const pillSemEnd = semEnd.length ? `<span class="pill crit">⚠ ${semEnd.length} há mais de 7 dias</span>` : '';

      const ctrlSort = `

    function buildCorredorSection(letra, rows, searchTerm, autoOpen) {
      if (!rows.length) {
        return `<div class="mapa-section">
      <div class="mapa-section-head">
        <span class="mapa-chevron">▶</span>
        <span class="mapa-section-title">Corredor ${esc(letra)}</span>
        <div class="mapa-section-pills"><span class="pill total">Sem dados</span></div>
      </div>
    </div>`;
      }

      // Agrupar por posição
      const byPos = {};
      rows.forEach(r => {
        const key = r.posicao;
        if (!byPos[key]) byPos[key] = [];
        byPos[key].push(r);
      });

      // Descobrir range de níveis e slots
      const niveis = [...new Set(rows.map(r => r.nivel).filter(v => v !== ''))].map(Number).sort((a, b) => b - a); // desc (top=maior)
      const slots = [...new Set(rows.map(r => r.slot).filter(v => v))].map(Number).sort((a, b) => a - b);
      const maxSlot = slots.length ? Math.max(...slots) : 0;
      const allSlots = Array.from({ length: maxSlot }, (_, i) => i + 1);

      // Stats
      const totalMat = new Set(rows.map(r => r.material)).size;
      const vagasOcup = Object.keys(byPos).length;
      const vagasCrit = Object.values(byPos).filter(rs => rowsStatus(rs) === 'crit').length;
      const vagasWarn = Object.values(byPos).filter(rs => rowsStatus(rs) === 'warn').length;

      const pillCrit = vagasCrit ? `<span class="pill crit">⚠ ${vagasCrit} vencido${vagasCrit > 1 ? 's' : ''}</span>` : '';
      const pillWarn = vagasWarn ? `<span class="pill warn">${vagasWarn} atenção</span>` : '';

      // Eixo X (rótulos de slot)
      const slotAxisHtml = `<div class="corredor-slot-axis">${allSlots.map(s => `<div class="corredor-slot-label">${String(s).padStart(3, '0')}</div>`).join('')}</div>`;

      // Linhas do grid (nivel desc = topo primeiro)
      const gridRows = niveis.map(nivel => {
        const nivelStr = String(nivel).padStart(2, '0');
        const cells = allSlots.map(slot => {
          const slotStr = String(slot).padStart(3, '0');
          const pos = `${letra}-${nivelStr}-${slotStr}`;
          const posRows = byPos[pos];
          if (!posRows || !posRows.length) {
            return `<div class="pallet-cell empty"><span class="pallet-empty-label">${esc(pos)}</span></div>`;
          }
          const status = rowsStatus(posRows);
          const primary = [...posRows].sort((a, b) => (daysUntil(a.data_vencimento) || 9999) - (daysUntil(b.data_vencimento) || 9999))[0];
          const days = daysUntil(primary.data_vencimento);
          const vencLabel = days !== null
            ? (days < 0 ? `${Math.abs(days)}d venc.` : days === 0 ? 'hoje' : `+${days}d`)
            : '';
          const highlight = searchTerm && (
            normStr(primary.material).includes(searchTerm) ||
            normStr(primary.nome).includes(searchTerm) ||
            normStr(primary.lote).includes(searchTerm)
          ) ? ' highlight-match' : '';
          const multiBadge = posRows.length > 1
            ? `<div class="pallet-multi-badge">+${posRows.length - 1}</div>` : '';
          const rowsData = esc(JSON.stringify(posRows.map(r => ({
            material: r.material, nome: r.nome, lote: r.lote,
            estoque: r.estoque, data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null
          }))));
          return `<div class="pallet-cell ${status}${highlight}"
          data-posicao="${esc(pos)}"
          data-rows="${rowsData}">
        ${multiBadge}
        <div class="pallet-pos">${esc(pos)}</div>
        <div class="pallet-mat">${esc(primary.material)}${primary.material ? `<button class="copy-btn" data-copy="${esc(primary.material)}" title="Copiar">📋</button>` : ''}</div>
        <div class="pallet-nome">${esc(primary.nome)}</div>
        <div class="pallet-footer">
          <span class="pallet-estoque">${fmt(primary.estoque)} kg</span>
          <span class="pallet-venc">${esc(vencLabel)}</span>
        </div>
      </div>`;
        }).join('');
        return `<div class="corredor-row">
      <div class="corredor-nivel-label">N${nivel}</div>
      ${cells}
    </div>`;
      }).join('');

      const openClass = autoOpen || vagasCrit > 0 ? 'open' : '';
      return `<div class="mapa-section">
    <div class="mapa-section-head ${openClass}" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title">Corredor ${esc(letra)}</span>
      <div class="mapa-section-pills">
        <span class="pill total">${totalMat} material${totalMat !== 1 ? 's' : ''}</span>
        <span class="pill total">${vagasOcup} vaga${vagasOcup !== 1 ? 's' : ''} ocupada${vagasOcup !== 1 ? 's' : ''}</span>
        ${pillWarn}${pillCrit}
      </div>
    </div>
    <div class="mapa-section-body ${openClass}">
      ${slotAxisHtml}
      <div class="corredor-grid">${gridRows}</div>
    </div>
  </div>`;
    }

    function computeFefo(estoque) {
      const byPos = {};
      estoque.forEach(r => {
        if (r.posicao === 'CORAN-021') return;
        if (!byPos[r.posicao]) byPos[r.posicao] = [];
        byPos[r.posicao].push(r);
      });
      const byMat = {};
      Object.entries(byPos).forEach(([pos, rows]) => {
        const primary = [...rows].sort((a, b) => {
          const da = a.data_vencimento ? a.data_vencimento.getTime() : Infinity;
          const db = b.data_vencimento ? b.data_vencimento.getTime() : Infinity;
          return da - db;
        })[0];
        if (!byMat[primary.material]) byMat[primary.material] = [];
        byMat[primary.material].push({ posicao: pos, venc: primary.data_vencimento });
      });
      const fefoMap = {};
      Object.values(byMat).forEach(positions => {
        if (positions.length < 2) return; // badge só faz sentido com >1 posição
        positions.sort((a, b) => {
          const da = a.venc ? a.venc.getTime() : Infinity;
          const db = b.venc ? b.venc.getTime() : Infinity;
          return da - db;
        });
        positions.forEach((p, i) => { fefoMap[p.posicao] = i + 1; });
      });
      return fefoMap;
    }
    function getPikInfo(material) {
      const rows = _pikByMaterial.get(material);
      if (!rows || !rows.length) return null;
      const total = rows.reduce((s, r) => s + (r.estoque || 0), 0);
      return { total, vagas: rows.length, rows };

    function pikTagHtml(pikData, tagClass) {
      if (!pikData) return `<span class="${tagClass} pik-none">📦 PIK: sem posição</span>`;
      const summary = pikData.vagas === 1
        ? `📦 PIK: ${fmt(pikData.total)} kg (${esc(pikData.rows[0].posicao || '—')})`
        : `📦 PIK Total: ${fmt(pikData.total)} kg (em ${pikData.vagas} vagas)`;

        : '';
      return `<span class="${tagClass} pik">${summary}${details}</span>`;

    function hexA(hex, a) {
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }
    function matInfo(nome) {
      let _c = _matInfoCache.get(nome);
      if (_c) return _c;
      _c = _matInfoCalc(nome);
      _matInfoCache.set(nome, _c);
      return _c;
    }
    function _matInfoCalc(nome) {
      const n = normStr(nome);
      const isCorante = /corante|mistura\s+de\s+corante|tint/.test(n);
      const isAroma = !isCorante && /aroma|mix\b/.test(n);
      if (isCorante) {
        // Isola o prefixo antes do " - " (ex: "vermelho natal softgel" de "vermelho natal softgel - corante artif")
        const sep = n.indexOf(' - ');
        const prefix = sep >= 0 ? n.slice(0, sep).trim() : n;
        // 1ª passagem: compostos startsWith (mais específico)
        for (const [kw, color] of CORANTE_COMPOSTOS) {
          if (prefix.startsWith(kw)) return { type: 'corante', color };
        }
        // 2ª passagem: simples startsWith (ex: VERMELHO NATAL → começa com VERMELHO)
        for (const [kw, color] of CORANTE_SIMPLES) {
          if (prefix.startsWith(kw)) return { type: 'corante', color };
        }
        // 3ª passagem: fallback includes em qualquer posição
        for (const [kw, color] of CORANTE_COMPOSTOS) {
          if (prefix.includes(kw)) return { type: 'corante', color };
        }
        for (const [kw, color] of CORANTE_SIMPLES) {
          if (prefix.includes(kw)) return { type: 'corante', color };
        }
        return { type: 'corante', color: '#6B7280' };
      }
      if (isAroma) {
        for (const [kw, emoji] of AROMA_EMOJIS) { if (n.includes(kw)) return { type: 'aroma', emoji }; }
        return { type: 'aroma', emoji: '✨' };
      }
      return { type: 'neutro' };
    }

    function buildCorredorCompacta(letra, rows, searchTerm, fefoMap = {}) {

      const niveis = [...new Set(rows.map(r => r.nivel).filter(v => v !== ''))].map(Number).sort((a, b) => b - a);
      const maxSlot = Math.max(...rows.map(r => r.slot).filter(Boolean), 0);
      const half = Math.ceil(maxSlot / 2);
      const slotsDir = Array.from({ length: half }, (_, i) => i + 1);               // 001→016 (Lado Direito)

        ${pillWarn}${pillCrit}
      </div>
    </div>
    <div class="mapa-section-body open">

      <div class="corredor-duplo">${levelsHtml}</div>
      <div class="corredor-side-label">▼ Lado Esquerdo (0${String(half + 1).padStart(2, '0')}–0${String(maxSlot).padStart(2, '0')})</div>
    </div>

    }

    function buildCorredorIso(letra, rows, searchTerm) {
      if (!rows.length) return buildCorredorSection(letra, rows, searchTerm, false);

      const byPos = {};
      rows.forEach(r => { if (!byPos[r.posicao]) byPos[r.posicao] = []; byPos[r.posicao].push(r); });
