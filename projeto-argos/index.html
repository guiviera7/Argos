            estoque: r.estoque, data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null
          }))));
          const hiCls = searchTerm && (normStr(primary.material + ' ' + primary.nome + ' ' + primary.lote).includes(searchTerm)) ? ' highlight-match' : '';
          return `<div class="iso-cell ${status}${hiCls}" data-posicao="${esc(pos)}" data-rows="${rowsData}">
        <span class="iso-cell-pos">${slotStr}</span>
        <span class="iso-cell-kg">${fmt(primary.estoque)}</span>
      </div>`;
        }).join('');
        return `<div class="iso-level" style="--iso-z:${zDepth}px" data-nivel="${nivel}">
      <div class="iso-nivel-label">N${nivel}</div>${cells}
    </div>`;
      }).join('');

      return `<div class="mapa-section">
    <div class="mapa-section-head open" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title">Corredor ${esc(letra)}</span>
      <div class="mapa-section-pills">
        <span class="pill total">${totalMat} material${totalMat !== 1 ? 's' : ''}</span>
        <span class="pill total">${vagasOcup} vaga${vagasOcup !== 1 ? 's' : ''} ocupada${vagasOcup !== 1 ? 's' : ''}</span>
        ${pillWarn}${pillCrit}
      </div>
    </div>
    <div class="mapa-section-body open">
      <div class="iso-scene">
        <div class="iso-rack">${levelsHtml}</div>
      </div>
    </div>
  </div>`;
    }

    function buildMiniMapa(corrJ, corrK, searchTerm) {
      function buildSingle(letra, rows) {
        if (!rows.length) {
          return `<div class="mini-mapa-corredor">
        <div class="mini-mapa-title">Corredor ${esc(letra)}</div>
        <div style="font-size:11px;color:var(--text-muted);padding:4px 0">Sem dados</div>
      </div>`;
        }
        const byPos = {};
        rows.forEach(r => { if (!byPos[r.posicao]) byPos[r.posicao] = []; byPos[r.posicao].push(r); });
        const niveis = [...new Set(rows.map(r => r.nivel).filter(v => v !== ''))].map(Number).sort((a, b) => b - a);
        const maxSlot = Math.max(...rows.map(r => r.slot).filter(Boolean), 0);
        const allSlots = Array.from({ length: maxSlot }, (_, i) => i + 1);

        const vagasCrit = Object.values(byPos).filter(rs => rowsStatus(rs) === 'crit').length;
        const vagasWarn = Object.values(byPos).filter(rs => rowsStatus(rs) === 'warn').length;
        const statExt = (vagasCrit ? ` · <span style="color:var(--danger)">${vagasCrit} crit</span>` : '')
          + (vagasWarn ? ` · <span style="color:var(--warning)">${vagasWarn} warn</span>` : '');

        const axisHtml = allSlots.map(s =>
          `<div class="mini-mapa-slot-label">${s % 4 === 0 ? String(s).padStart(3, '0') : ''}</div>`
        ).join('');

        const rowsHtml = niveis.map(nivel => {
          const nivelStr = String(nivel).padStart(2, '0');
          const cells = allSlots.map(slot => {
            const slotStr = String(slot).padStart(3, '0');
            const pos = `${letra}-${nivelStr}-${slotStr}`;
            const posRows = byPos[pos];
            if (!posRows?.length)
              return `<div class="mini-cell empty" title="${pos}"></div>`;
            const status = rowsStatus(posRows);
            const primary = [...posRows].sort((a, b) => (daysUntil(a.data_vencimento) || 9999) - (daysUntil(b.data_vencimento) || 9999))[0];
            const rowsData = esc(JSON.stringify(posRows.map(r => ({
              material: r.material, nome: r.nome, lote: r.lote,
              estoque: r.estoque, data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null
            }))));
            const hiCls = searchTerm && normStr(primary.material + ' ' + primary.nome + ' ' + primary.lote).includes(searchTerm) ? ' highlight-match' : '';
            return `<div class="mini-cell ${status}${hiCls}" data-posicao="${esc(pos)}" data-rows="${rowsData}" onclick="goExpandida('${esc(pos)}')"></div>`;
          }).join('');
          return `<div class="mini-mapa-row">${cells}</div>`;
        }).join('');

        const labelHtml = niveis.map(n => `<div class="mini-mapa-nivel-label">N${n}</div>`).join('');

        return `<div class="mini-mapa-corredor">
      <div class="mini-mapa-title">Corredor ${esc(letra)} <span style="font-weight:400;font-size:11px;color:var(--text-muted)">${new Set(rows.map(r => r.material)).size} mat · ${Object.keys(byPos).length} ocup${statExt}</span></div>
      <div class="mini-mapa-grid-wrap">
        <div class="mini-mapa-level-labels">${labelHtml}</div>
        <div class="mini-mapa-grid">
          <div class="mini-mapa-slot-axis">${axisHtml}</div>
          <div class="mini-mapa-rows">${rowsHtml}</div>
        </div>
      </div>
    </div>`;
      }
      return `<div class="mini-mapa-wrapper">${buildSingle('J', corrJ)}${buildSingle('K', corrK)}</div>`;
    }

    function buildCorredorExpandido(letra, rows, searchTerm, fefoMap = {}) {
      if (!rows.length) {
        return `<div class="mapa-section">
      <div class="mapa-section-head" onclick="toggleMapaSection(this)">
        <span class="mapa-chevron">▶</span>
        <span class="mapa-section-title">Corredor ${esc(letra)}</span>
        <div class="mapa-section-pills"><span class="pill total">Sem dados</span></div>
      </div>
    </div>`;
      }
      const byPos = {};
      rows.forEach(r => { if (!byPos[r.posicao]) byPos[r.posicao] = []; byPos[r.posicao].push(r); });
      const niveis = [...new Set(rows.map(r => r.nivel).filter(v => v !== ''))].map(Number).sort((a, b) => b - a);
      const maxSlot = Math.max(...rows.map(r => r.slot).filter(Boolean), 0);
      const half = Math.ceil(maxSlot / 2);
      const slotsDir = Array.from({ length: half }, (_, i) => i + 1);               // 001→016 (Lado Direito)
      const slotsEsq = Array.from({ length: maxSlot - half }, (_, i) => maxSlot - i); // 032→017 (Lado Esquerdo)

      const totalMat = new Set(rows.map(r => r.material)).size;
      const vagasOcup = Object.keys(byPos).length;
      const vagasCrit = Object.values(byPos).filter(rs => rowsStatus(rs) === 'crit').length;
      const vagasWarn = Object.values(byPos).filter(rs => rowsStatus(rs) === 'warn').length;
      const pillCrit = vagasCrit ? `<span class="pill crit">⚠ ${vagasCrit} vencido${vagasCrit > 1 ? 's' : ''}</span>` : '';
      const pillWarn = vagasWarn ? `<span class="pill warn">${vagasWarn} atenção</span>` : '';

      const slotAxisHtml = `<div class="expandida-slot-axis">${slotsDir.map(s =>
        `<div class="expandida-slot-label">${String(s).padStart(3, '0')}</div>`
      ).join('')}</div>`;

      const makeCell = (nivel, slot) => {
        const nivelStr = String(nivel).padStart(2, '0');
        const slotStr = String(slot).padStart(3, '0');
        const pos = `${letra}-${nivelStr}-${slotStr}`;
        const posRows = byPos[pos];
        if (!posRows?.length)
          return `<div class="expandida-cell empty" data-posicao="${esc(pos)}" data-empty="1"></div>`;
        const status = rowsStatus(posRows);
        const primary = [...posRows].sort((a, b) => (daysUntil(a.data_vencimento) || 9999) - (daysUntil(b.data_vencimento) || 9999))[0];
        const days = daysUntil(primary.data_vencimento);
        const daysLbl = days !== null ? (days < 0 ? `${Math.abs(days)}d venc.` : days === 0 ? 'hoje' : `+${days}d`) : '';
        const rowsData = esc(JSON.stringify(posRows.map(r => ({
          material: r.material, nome: r.nome, lote: r.lote, estoque: r.estoque,
          data_entrada: r.data_entrada ? r.data_entrada.toISOString() : null,
          data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null
        }))));
        const hiCls = searchTerm && normStr(primary.material + ' ' + primary.nome + ' ' + primary.lote).includes(searchTerm) ? ' highlight-match' : '';
        const focCls = state.expandedFocus === pos ? ' focused' : '';
        const multi = posRows.length > 1 ? `<div class="pallet-multi-badge">+${posRows.length - 1}</div>` : '';
        const info = matInfo(primary.nome);
        const matStyle = info.type === 'corante' ? ` style="background:#1a1f2e;border-left:4px solid ${info.color};box-shadow:inset 4px 0 12px ${hexA(info.color, 0.3)}"` : '';
        const emoji = info.type === 'aroma' ? `<span class="mat-emoji">${info.emoji}</span>` : '';
        const fefoNum = fefoMap[pos];
        const fefoBadge = fefoNum ? `<span class="fefo-badge">${fefoNum}</span>` : '';
        return `<div class="expandida-cell ${status}${hiCls}${focCls}"${matStyle} data-posicao="${esc(pos)}" data-material="${esc(primary.material)}" data-rows="${rowsData}">
      ${fefoBadge}${multi}${emoji}
      <div class="exp-pos">${esc(pos)}</div>
      <div class="exp-nome" title="${esc(primary.nome || primary.material || '—')}">${esc((primary.nome || primary.material || '—').split(' ').slice(0, 3).join(' '))}</div>
      <div class="exp-kg">${fmt(primary.estoque)} kg</div>
      <div class="exp-days">${esc(daysLbl)}</div>
    </div>`;
      };

      const shelvesHtml = niveis.map(nivel => {
        const cellsDir = slotsDir.map(slot => makeCell(nivel, slot)).join('');
        const cellsEsq = slotsEsq.map(slot => makeCell(nivel, slot)).join('');
        return `<div class="corredor-nivel-pair">
      <div class="expandida-shelf">
        <div class="expandida-shelf-bar"><span class="expandida-shelf-label">N${nivel}</span></div>
        <div class="expandida-row">
          <div class="expandida-nivel-label">N${nivel}</div>
          <div class="expandida-cells">${cellsDir}</div>
        </div>
      </div>
      <div class="corredor-strip">
        <div style="width:46px;flex-shrink:0"></div>
        <span class="corredor-strip-lbl">Entrada ←</span>
        <div class="corredor-strip-line"></div>
        <span class="corredor-strip-lbl">→ Fundo</span>
      </div>
      <div class="expandida-row">
        <div class="expandida-nivel-label">N${nivel}</div>
        <div class="expandida-cells">${cellsEsq}</div>
      </div>
    </div>`;
      }).join('');

      return `<div class="mapa-section">
    <div class="mapa-section-head open" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title">Corredor ${esc(letra)}</span>
      <div class="mapa-section-pills">
        <span class="pill total">${totalMat} material${totalMat !== 1 ? 's' : ''}</span>
        <span class="pill total">${vagasOcup} vaga${vagasOcup !== 1 ? 's' : ''} ocupada${vagasOcup !== 1 ? 's' : ''}</span>
        ${pillWarn}${pillCrit}
      </div>
    </div>
    <div class="mapa-section-body open">
      <div class="corredor-side-label">▲ Lado Direito (001–0${String(half).padStart(2, '0')})</div>
      ${slotAxisHtml}
      <div class="corredor-duplo">${shelvesHtml}<div class="expandida-floor-bar"></div></div>
      <div class="corredor-side-label">▼ Lado Esquerdo (0${String(half + 1).padStart(2, '0')}–0${String(maxSlot).padStart(2, '0')})</div>
    </div>
  </div>`;
    }

    /* ── GERENCIAMENTO DE BOLHAS ABERTAS (máx. 5) ── */
    const _openPopups = [];
    const MAX_OPEN_POPUPS = 5;

    /* Retorna true se a posição já tem uma bolha aberta (impede duplicatas) */
    function _posicaoJaAberta(posicao) {
      return _openPopups.some(p => p._posicao === posicao && p.isConnected);
    }

    function _trackPopup(popup) {
      _openPopups.push(popup);
      if (_openPopups.length > MAX_OPEN_POPUPS) {
        const oldest = _openPopups.shift();
        // Limpar highlights da bolha mais antiga
        if (oldest._mentionedCells) {
          oldest._mentionedCells.forEach(c => {
            c.classList.remove('popup-mentioned');
            c.classList.remove('popup-hover-hl');
          });
        }
        if (oldest.isConnected) oldest.remove();
      }
    }

    function _untrackPopup(popup) {
      const i = _openPopups.indexOf(popup);
      if (i >= 0) _openPopups.splice(i, 1);
    }

    /* Marca células mencionadas numa bolha como .popup-mentioned e remove ao fechar */
    function bindPopupCellHighlights(popup, mentionedCells) {
      popup._mentionedCells = mentionedCells; // para cleanup ao fechar automaticamente
      mentionedCells.forEach(c => c.classList.add('popup-mentioned'));
      popup.querySelector('.detail-popup-close').addEventListener('click', () => {
        mentionedCells.forEach(c => { c.classList.remove('popup-mentioned'); c.classList.remove('popup-hover-hl'); });
      });
    }

    /* Ao hover numa linha [data-fefo-pos] da bolha, realça a célula correspondente no mapa */
    function bindFefoRowHover(popup, containerEl) {
      if (!containerEl) return;
      popup.querySelectorAll('[data-fefo-pos]').forEach(row => {
        const fp = row.dataset.fefoPos;
        row.addEventListener('mouseenter', () => {
          const cells = containerEl.querySelectorAll(`[data-posicao="${CSS.escape(fp)}"]`);
          if (cells.length === 1) cells[0].classList.add('popup-hover-hl');
        });
        row.addEventListener('mouseleave', () => {
          containerEl.querySelectorAll(`[data-posicao="${CSS.escape(fp)}"]`)
            .forEach(c => c.classList.remove('popup-hover-hl'));
        });
      });
    }

    function showDetailPopup(posicao, rows, cellElement) {
      if (_posicaoJaAberta(posicao)) return; // já existe bolha aberta para esta vaga
      const material = rows[0]?.material;

      const itemsHtml = rows.map(r => {
        const d = r.data_vencimento ? new Date(r.data_vencimento) : null;
        const entrada = r.data_entrada ? new Date(r.data_entrada) : null;
        const days = daysUntil(d);
        let vencTag = '';
        if (days !== null) {
          const cls = days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const label = days < 0 ? `Vencido há ${Math.abs(days)}d` : days === 0 ? 'Vence hoje' : `Vence em ${days}d`;
          vencTag = `<span class="tt-tag ${cls}">${label} — ${fmtDate(d)}</span>`;
        }
        const entradaTag = entrada ? `<span class="tt-tag">Entrada: ${fmtDate(entrada)}</span>` : '';
        const pikData = getPikInfo(r.material);
        const pikTag = pikTagHtml(pikData, 'tt-tag');
        return `<div class="tt-item">
      <div class="tt-mat">${esc(r.material)}<button class="copy-btn" data-copy="${esc(r.material)}" title="Copiar">📋</button></div>
      <div class="tt-nome">${esc(r.nome)}</div>
      <div class="tt-row">
        <span class="tt-tag tt-lote">Lote: ${esc(r.lote || '—')}${r.lote ? `<button class="copy-btn" data-copy="${esc(r.lote)}" title="Copiar">📋</button>` : ''}</span>
        <span class="tt-tag">${fmt(r.estoque)} kg</span>
        ${softgelTag(r.material, r.nome, r.estoque, 'tt-tag')}
        ${entradaTag}
        ${vencTag}
      </div>
      <div class="tt-row">${pikTag}</div>
    </div>`;
      }).join('');

      // Seção "Próximos lotes FEFO" com todas as vagas do mesmo material
      const allMatRows = material ? state.estoque.filter(r => r.material === material) : [];
      let fefoSection = '';
      if (allMatRows.length > 0) {
        const sorted = [...allMatRows].sort((a, b) => {
          const da = a.data_vencimento ? a.data_vencimento.getTime() : Infinity;
          const db = b.data_vencimento ? b.data_vencimento.getTime() : Infinity;
          return da - db;
        });
        const fefoRows = sorted.map((r, i) => {
          const fefoNum = i + 1;
          const days = daysUntil(r.data_vencimento);
          const daysCls = days === null ? '' : days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const daysLbl = days === null ? '—' : days < 0 ? `${Math.abs(days)}d venc.` : days === 0 ? 'hoje' : `+${days}d`;
          const isCur = r.posicao === posicao;
          return `<div class="pik-pes-row${isCur ? ' fefo-current-row' : ''}" data-fefo-pos="${esc(r.posicao)}">
        <span class="pik-pes-fefo">${fefoNum}º</span>
        <span class="pik-pes-pos">${esc(r.posicao)}</span>
        <span class="pik-pes-lote" title="${esc(r.lote || '')}">${esc(r.lote || '—')}${r.lote ? `<button class="copy-btn" data-copy="${esc(r.lote)}" title="Copiar" style="margin-left:3px;font-size:9px">📋</button>` : ''}</span>
        <span class="pik-pes-kg">${fmt(r.estoque)} kg</span>
        <span class="pik-pes-days ${daysCls}">${daysLbl}</span>
      </div>`;
        }).join('');
        fefoSection = `<div class="pik-detail-section"><div class="pik-detail-title">📍 Próximos lotes FEFO — ${esc(material)}</div>${fefoRows}</div>`;
      }

      const popup = document.createElement('div');
      popup.className = 'detail-popup visible';
      popup.innerHTML = `
    <div class="detail-popup-header">
      <div class="tt-pos">${esc(posicao)}<button class="copy-btn" data-copy="${esc(posicao)}" title="Copiar">📋</button></div>
      ${(state.fefoMap || {})[posicao] ? `<span class="fefo-popup-badge">FEFO ${(state.fefoMap || {})[posicao]}º</span>` : ''}
      <button class="detail-popup-close">✕</button>
    </div>
    ${itemsHtml}${fefoSection}`;
      popup._posicao = posicao;
      document.body.appendChild(popup);
      popup.querySelector('.detail-popup-close').addEventListener('click', () => { _untrackPopup(popup); popup.remove(); });
      _trackPopup(popup);
      bindCopyButtons(popup);
      makeDraggable(popup);

      // Realçar vagas mencionadas no mapa
      const pesContainer = document.getElementById('estoque-content');
      const pikContainer = document.getElementById('picking-content');
      const mentionedCells = [];
      if (pesContainer) {
        allMatRows.forEach(r => {
          const cells = pesContainer.querySelectorAll(`[data-posicao="${CSS.escape(r.posicao)}"]`);
          if (cells.length === 1) mentionedCells.push(cells[0]);
        });
      }
      const pikData = getPikInfo(material);
      if (pikData && pikContainer) {
        pikData.rows.forEach(r => {
          const cells = pikContainer.querySelectorAll(`[data-posicao="${CSS.escape(r.posicao)}"]`);
          if (cells.length === 1) mentionedCells.push(cells[0]);
        });
      }
      bindPopupCellHighlights(popup, mentionedCells);
      bindFefoRowHover(popup, pesContainer);

      // Posicionar ao lado da célula clicada
      const cRect = cellElement.getBoundingClientRect();
      const pw = popup.offsetWidth || 300;
      let x = cRect.right + 10;
      let y = cRect.top;
      if (x + pw > window.innerWidth - 8) x = cRect.left - pw - 10;
      if (x < 8) x = 8;
      popup.style.left = x + 'px';
      popup.style.top = y + 'px';
      requestAnimationFrame(() => {
        const ph = popup.offsetHeight;
        let ny = cRect.top;
        if (ny + ph > window.innerHeight - 8) ny = window.innerHeight - ph - 8;
        if (ny < 8) ny = 8;
        popup.style.top = ny + 'px';
      });
    }
    function showEmptyDetailPopup(posicao, cellElement) {
      if (_posicaoJaAberta(posicao)) return; // já existe bolha aberta para esta vaga
      const popup = document.createElement('div');
      popup.className = 'detail-popup visible';
      popup.innerHTML = `
    <div class="detail-popup-header">
      <div class="tt-pos">${esc(posicao)}<button class="copy-btn" data-copy="${esc(posicao)}" title="Copiar">📋</button></div>
      <button class="detail-popup-close">✕</button>
    </div>
    <div class="tt-item">
      <div class="tt-mat" style="color:var(--text-muted)">Vaga vazia</div>
      <div class="tt-nome" style="color:var(--text-muted);margin-top:4px">Sem material alocado</div>
    </div>`;
      popup._posicao = posicao;
      document.body.appendChild(popup);
      popup.querySelector('.detail-popup-close').addEventListener('click', () => { _untrackPopup(popup); popup.remove(); });
      _trackPopup(popup);
      bindCopyButtons(popup);
      makeDraggable(popup);
      const cRect = cellElement.getBoundingClientRect();
      const pw = popup.offsetWidth || 300;
      let x = cRect.right + 10;
      let y = cRect.top;
      if (x + pw > window.innerWidth - 8) x = cRect.left - pw - 10;
      if (x < 8) x = 8;
      popup.style.left = x + 'px';
      popup.style.top = y + 'px';
      requestAnimationFrame(() => {
        const ph = popup.offsetHeight;
        let ny = cRect.top;
        if (ny + ph > window.innerHeight - 8) ny = window.innerHeight - ph - 8;
        if (ny < 8) ny = 8;
        popup.style.top = ny + 'px';
      });
    }

    function makeDraggable(popup) {
      const handle = popup.querySelector('.detail-popup-header') || popup;
      let startX, startY, startL, startT;
      handle.addEventListener('mousedown', e => {
        if (e.target.closest('.detail-popup-close')) return; // não arrastar pelo ✕
        e.preventDefault();
        startX = e.clientX; startY = e.clientY;
        startL = parseInt(popup.style.left) || 0;
        startT = parseInt(popup.style.top) || 0;
        popup.classList.add('dragging');
        popup.style.zIndex = ++_dragZ;
        function onMove(e) {
          let nx = startL + (e.clientX - startX);
          let ny = startT + (e.clientY - startY);
          // Manter dentro da viewport
          nx = Math.max(0, Math.min(nx, window.innerWidth - popup.offsetWidth));
          ny = Math.max(0, Math.min(ny, window.innerHeight - popup.offsetHeight));
          popup.style.left = nx + 'px';
          popup.style.top = ny + 'px';
        }
        function onUp() {
          popup.classList.remove('dragging');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
    let _dragZ = 500;

    function closeDetailPopup() {
      _openPopups.forEach(p => { if (p.isConnected) p.remove(); });
      _openPopups.length = 0;
      document.querySelectorAll('.detail-popup.visible').forEach(p => p.remove());
    }

    function bindCopyButtons(popup) {
      popup.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          navigator.clipboard.writeText(btn.dataset.copy).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✓';
            btn.style.color = 'var(--success)'; btn.style.opacity = '1';
            setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.opacity = ''; }, 1000);
          }).catch(() => { });
        });
      });
    }

    // Delegação global para .copy-btn fora de popups (tabelas, cards, expand)
    document.addEventListener('click', e => {
      const btn = e.target.closest('.copy-btn[data-copy]');
      if (!btn || btn._copyBound) return;
      e.stopPropagation();
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.style.color = 'var(--success)'; btn.style.opacity = '1';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.opacity = ''; }, 1000);
      }).catch(() => { });
    });

    function buildN1Section(corrJn1, corrKn1, searchTerm, fefoMap) {
      const allN1 = [...corrJn1, ...corrKn1];
      if (!allN1.length) return '';

      function buildSides(letra, rowsN1) {
        if (!rowsN1.length) return { dirHtml: '<div style="font-size:11px;color:var(--text-muted);padding:4px 0">Sem dados</div>', esqHtml: '', crit: 0, warn: 0, mat: 0 };

        const byPos = {};
        rowsN1.forEach(r => { if (!byPos[r.posicao]) byPos[r.posicao] = []; byPos[r.posicao].push(r); });

        const maxSlot = Math.max(...rowsN1.map(r => r.slot).filter(Boolean), 32);
        const half = Math.ceil(maxSlot / 2);
        const slotsDir = Array.from({ length: half }, (_, i) => i + 1);          // 001→016
        const slotsEsq = Array.from({ length: maxSlot - half }, (_, i) => half + i + 1);   // 017→032

        const makeRow = (slot, idx) => {
          const slotStr = String(slot).padStart(3, '0');
          const pos = `${letra}-01-${slotStr}`;
          const posRows = byPos[pos];
          if (!posRows?.length) return '';
          const status = rowsStatus(posRows);
          const primary = [...posRows].sort((a, b) => (daysUntil(a.data_vencimento) || 9999) - (daysUntil(b.data_vencimento) || 9999))[0];
          const days = daysUntil(primary.data_vencimento);
          const daysLbl = days !== null ? (days < 0 ? `${Math.abs(days)}d venc.` : days === 0 ? 'hoje' : `+${days}d`) : '—';
          const rowsData = esc(JSON.stringify(posRows.map(r => ({
            material: r.material, nome: r.nome, lote: r.lote, estoque: r.estoque,
            data_entrada: r.data_entrada ? r.data_entrada.toISOString() : null,
            data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null
          }))));
          const hiCls = searchTerm && normStr(primary.material + ' ' + primary.nome + ' ' + primary.lote).includes(searchTerm) ? ' highlight-match' : '';
          const info = matInfo(primary.nome);
          const matStyle = info.type === 'corante'
            ? ` style="border-left:4px solid ${info.color};box-shadow:inset 4px 0 10px ${hexA(info.color, 0.25)}"`
            : '';
          const fefoNum = fefoMap[pos];
          const fefoHtml = fefoNum ? `<span class="n1-fefo">${fefoNum}</span>` : '';

          // Conteúdo do accordion
          const expandItems = posRows.map(r => {
            const rInfo = matInfo(r.nome);
            const d = r.data_vencimento ? new Date(r.data_vencimento) : null;
            const rDays = daysUntil(d);
            const vCls = rDays === null ? '' : rDays < 0 ? 'crit' : rDays <= 30 ? 'warn' : 'ok';
            const vLbl = rDays === null ? '' : rDays < 0
              ? `Vencido há ${Math.abs(rDays)}d (${fmtDate(d)})`
              : rDays === 0 ? `Vence hoje (${fmtDate(d)})`
                : `Vence em ${rDays}d (${fmtDate(d)})`;
            const swatchStyle = rInfo.type === 'corante'
              ? `background:${rInfo.color}`
              : rInfo.type === 'aroma'
                ? `background:var(--bg-card);border:1px solid var(--border);text-align:center;line-height:14px;font-size:11px`
                : `background:var(--bg-card);border:1px solid var(--border)`;
            const swatchContent = rInfo.type === 'aroma' ? rInfo.emoji : '';
            const emojiPrefix = rInfo.type === 'aroma' ? rInfo.emoji + ' ' : '';
            const pikRaw = getPikInfo(r.material);
            const pikTag = (() => {
              if (!pikRaw) return `<span class="n1-expand-tag pik-none">sem PIK</span>`;
              const byPos = {};
              pikRaw.rows.forEach(p => { byPos[p.posicao || '—'] = (byPos[p.posicao || '—'] || 0) + (p.estoque || 0); });
              return Object.entries(byPos)
                .map(([pos, kg]) => `<span class="n1-expand-tag pik">${esc(pos)} ${fmt(kg)} kg</span>`)
                .join('');
            })();
            return `<div class="n1-expand-item">
          <div class="n1-expand-swatch" style="${swatchStyle}">${swatchContent}</div>
          <div class="n1-expand-col">
            <span class="n1-expand-mat">${emojiPrefix}${esc(r.material)}${r.material ? `<button class="copy-btn" data-copy="${esc(r.material)}" title="Copiar">📋</button>` : ''}</span>
            <span class="n1-expand-nome" title="${esc(r.nome)}">${esc(r.nome || '—')}</span>
            <div class="n1-expand-tags">
              <span class="n1-expand-tag">${fmt(r.estoque)} kg</span>
              <span class="n1-expand-tag">Lote: ${esc(r.lote || '—')}</span>
              ${vLbl ? `<span class="n1-expand-tag ${vCls}">${esc(vLbl)}</span>` : ''}
              ${pikTag}
            </div>
          </div>
        </div>`;
          }).join('');

          return `<div class="n1-row-wrap">
        <div class="n1-row ${status}${hiCls}"${matStyle} data-posicao="${esc(pos)}" data-material="${esc(primary.material)}" data-rows="${rowsData}">
          <span class="n1-row-num">${idx}</span>
          <span class="n1-row-pos">${esc(pos)}</span>
          <span class="n1-row-kg">${fmt(primary.estoque)} kg</span>
          ${softgelTag(primary.material, primary.estoque, '')}
          ${fefoHtml}
          <span class="n1-row-days">${esc(daysLbl)}</span>
        </div>
        <div class="n1-expand">${expandItems}</div>
      </div>`;
        };

        let dIdx = 0;
        const rowsDirHtml = slotsDir.map(slot => {
          const sl = String(slot).padStart(3, '0');
          if (!byPos[`${letra}-01-${sl}`]?.length) return '';
          return makeRow(slot, ++dIdx);
        }).join('');

        let eIdx = 0;
        const rowsEsqHtml = slotsEsq.map(slot => {
          const sl = String(slot).padStart(3, '0');
          if (!byPos[`${letra}-01-${sl}`]?.length) return '';
          return makeRow(slot, ++eIdx);
        }).join('');

        const dirLabel = `Lado Direito (001–0${String(half).padStart(2, '0')})`;
        const esqLabel = `Lado Esquerdo (0${String(half + 1).padStart(2, '0')}–0${String(maxSlot).padStart(2, '0')})`;

        const noData = '<span style="font-size:11px;color:var(--text-muted)">Sem vagas ocupadas</span>';
        const dirHtml = `<div class="n1-side-header">${dirLabel}</div><div class="n1-list">${rowsDirHtml || noData}</div>`;
        const esqHtml = `<div class="n1-side-header">${esqLabel}</div><div class="n1-list">${rowsEsqHtml || noData}</div>`;

        const crit = Object.values(byPos).filter(rs => rowsStatus(rs) === 'crit').length;
        const warn = Object.values(byPos).filter(rs => rowsStatus(rs) === 'warn').length;
        const mat = new Set(rowsN1.map(r => r.material)).size;
        return { dirHtml, esqHtml, crit, warn, mat };
      }

      const colJ = buildSides('J', corrJn1);
      const colK = buildSides('K', corrKn1);
      const totalMat = colJ.mat + colK.mat;
      const vagasCrit = colJ.crit + colK.crit;
      const vagasWarn = colJ.warn + colK.warn;
      const pillCrit = vagasCrit ? `<span class="pill crit">⚠ ${vagasCrit} vencido${vagasCrit > 1 ? 's' : ''}</span>` : '';
      const pillWarn = vagasWarn ? `<span class="pill warn">${vagasWarn} atenção</span>` : '';

      const jBlock = `<div class="n1-corredor-block">
    <div class="n1-corredor-block-title">Corredor J</div>
    <div class="n1-sides">
      <div>${colJ.dirHtml}</div>
      <div>${colJ.esqHtml}</div>
    </div>
  </div>`;
      const kBlock = corrKn1.length ? `<div class="n1-corredor-block">
    <div class="n1-corredor-block-title">Corredor K</div>
    <div class="n1-sides">
      <div>${colK.dirHtml}</div>
      <div>${colK.esqHtml}</div>
    </div>
  </div>` : '';

      return `<div class="mapa-section">
    <div class="mapa-section-head open" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title">Nível 1 — Pré-Ressuprimento</span>
      <div class="mapa-section-pills">
        <span class="pill total">${totalMat} material${totalMat !== 1 ? 's' : ''}</span>
        ${pillWarn}${pillCrit}
      </div>
    </div>
    <div class="mapa-section-body open">
      ${jBlock}${kBlock}
    </div>
  </div>`;
    }

    function toggleMapaSection(head) {
      head.classList.toggle('open');
      head.nextElementSibling.classList.toggle('open');
    }

    /* ═══════════════════════════════════════════════════
     * PICKING PIK
     * ═══════════════════════════════════════════════════ */
    function renderPikFamFilterPills() {
      const wrap = document.getElementById('pikFamFilterWrap');
      if (!wrap) return;
      const pills = FAMILY_DEFS.map(f => {
        const active = state.pikFamilyFilter.has(f.key) ? ' active' : '';
        return `<span class="fam-filter-pill${active}" onclick="togglePikFamily('${f.key}',this)">${f.label}</span>`;
      }).join('');
      wrap.innerHTML = pills + `<button class="btn-clear" style="align-self:center" onclick="clearPickingFilters()">Limpar</button>`;
    }
    function togglePikFamily(key, el) {
      if (state.pikFamilyFilter.has(key)) {
        state.pikFamilyFilter.delete(key);
        el.classList.remove('active');
      } else {
        state.pikFamilyFilter.add(key);
        el.classList.add('active');
      }
      renderPicking();
    }
    function getPickingFilters() {
      return { families: state.pikFamilyFilter };
    }
    function clearPickingFilters() {
      state.pikFamilyFilter.clear();
      document.querySelectorAll('.fam-filter-pill').forEach(p => p.classList.remove('active'));
      renderPicking();
    }

    /* ── PIK MAP: estrutura dos corredores ── */
    const PIK_CORREDORES_BASE = [
      { id: 'PF', maxSlot: 56, duplo: true },
      // PG é inserido dinamicamente em renderPicking() com base nos dados
      { id: 'PH', maxSlot: 51, duplo: true },
      { id: 'PI', maxSlot: 17, duplo: false },
    ];

    function buildPikAxis(slots) {
      return `<div class="pik-axis-row">${slots.map(s => {
        const lbl = (s % 10 === 0 || s === 1 || s === slots[slots.length - 1])
          ? String(s).padStart(3, '0') : '';
        return `<div class="pik-axis-cell">${lbl}</div>`;
      }).join('')}</div>`;
    }

    function buildPikCell(corridorId, slot, byPos, posTotal, familyFilter) {
      const slotStr = String(slot).padStart(3, '0');
      const pos = `${corridorId}-01-${slotStr}`;
      const posRows = byPos[pos];

      if (!posRows || !posRows.length) {
        return `<div class="pik-cell no-data"><span class="pik-cell-slot">${slotStr}</span></div>`;
      }

      const total = posTotal[pos] || 0;
      const thr = getCorredorThreshold(corridorId);
      const status = total === 0 ? 'pik-zero' : total <= thr ? 'pik-warn' : 'pik-ok';
      const kgTxt = total > 0 ? fmt(total) : '∅';

      // Family filter (dim, not hide)
      const famMatch = !familyFilter.size || posRows.some(r => familyFilter.has(getMaterialFamily(r.material)));
      const dimCls = !famMatch ? ' pik-dim' : '';
      const hiCls = (familyFilter.size && famMatch) ? ' highlight-match' : '';

      const rowsData = esc(JSON.stringify(posRows.map(r => ({
        material: r.material, nome: r.nome, lote: r.lote, estoque: r.estoque, posicao: r.posicao,
        data_entrada: r.data_entrada ? r.data_entrada.toISOString() : null,
        data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null,
      }))));

      return `<div class="pik-cell ${status}${dimCls}${hiCls}" data-posicao="${esc(pos)}" data-rows="${rowsData}">
    <span class="pik-cell-slot">${slotStr}</span>
    <span class="pik-cell-kg">${kgTxt}</span>
  </div>`;
    }

    function buildPikCorredorSection(cfg, byPos, posTotal, familyFilter) {
      const { id, maxSlot, duplo } = cfg;
      const allSlots = Array.from({ length: maxSlot }, (_, i) => i + 1);
      const half = Math.ceil(maxSlot / 2);
      const slotsA = allSlots.slice(0, half);
      const slotsB = [...allSlots.slice(half)].reverse();   // espelhado

      // Stats
      const corrThr = getCorredorThreshold(id);
      let cntOk = 0, cntWarn = 0, cntZero = 0, cntData = 0;
      allSlots.forEach(s => {
        const pos = `${id}-01-${String(s).padStart(3, '0')}`;
        if (!byPos[pos]) return;
        cntData++;
        const t = posTotal[pos] || 0;
        if (t === 0) cntZero++;
        else if (t <= corrThr) cntWarn++;
        else cntOk++;
      });
      const pillTotal = `<span class="pill total">${cntData} vaga${cntData !== 1 ? 's' : ''}</span>`;
      const pillWarn = cntWarn ? `<span class="pill warn">${cntWarn} atenção</span>` : '';
      const pillCrit = cntZero ? `<span class="pill crit">⚠ ${cntZero} crítico${cntZero > 1 ? 's' : ''}</span>` : '';
      const pillThr = `<span class="pik-thr-pill" onclick="event.stopPropagation();editCorredorThresh('${esc(id)}',this)">≤ <span class="pik-thr-val">${corrThr}</span> kg</span>`;

      const makeRow = slots => `<div class="pik-row">${slots.map(s => buildPikCell(id, s, byPos, posTotal, familyFilter)).join('')}</div>`;

      let bodyHtml;
      if (!duplo) {
        // PI — linha única
        bodyHtml = `
      <div class="pik-side-label">${id} — linha única (${maxSlot} vagas)</div>
      ${buildPikAxis(allSlots)}
      ${makeRow(allSlots)}`;
      } else {
        // PF / PH — dois lados espelhados
        const stripHtml = `<div class="pik-corredor-strip">
      <span class="pik-corredor-strip-lbl">← Corredor ${id} →</span>
      <div class="pik-corredor-strip-line"></div>
    </div>`;
        bodyHtml = `
      <div class="pik-side-label">Lado A — 001 a ${String(half).padStart(3, '0')}</div>
      ${buildPikAxis(slotsA)}
      ${makeRow(slotsA)}
      ${stripHtml}
      ${makeRow(slotsB)}
      ${buildPikAxis([...slotsB].reverse())}
      <div class="pik-side-label">Lado B — ${String(half + 1).padStart(3, '0')} a ${String(maxSlot).padStart(3, '0')}</div>`;
      }

      return `<div class="mapa-section">
    <div class="mapa-section-head open" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title" style="font-family:monospace">${esc(id)}</span>
      <div class="mapa-section-pills">${pillTotal}${pillWarn}${pillCrit}${pillThr}</div>
    </div>
    <div class="mapa-section-body open" style="overflow-x:auto">
      ${bodyHtml}
    </div>
  </div>`;
    }

    function showPikTooltip(e, posicao, rows) {
      const total = rows.reduce((s, r) => s + (r.estoque || 0), 0);
      const itemsHtml = rows.map(r => {
        const daysIn = r.data_entrada ? Math.floor((Date.now() - new Date(r.data_entrada).getTime()) / 86400000) : null;
        const days = daysUntil(r.data_vencimento ? new Date(r.data_vencimento) : null);
        let vencTag = '';
        if (days !== null) {
          const cls = days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const label = days < 0 ? `Vencido há ${Math.abs(days)}d` : days === 0 ? 'Vence hoje' : `Vence em ${days}d`;
          vencTag = `<span class="tt-tag ${cls}">${label}</span>`;
        }
        return `<div class="tt-item">
      <div class="tt-mat">${esc(r.material)}</div>
      <div class="tt-nome">${esc(r.nome)}</div>
      <div class="tt-row">
        <span class="tt-tag">${fmt(r.estoque)} kg</span>
        <span class="tt-tag">Lote: ${esc(r.lote || '—')}</span>
        ${daysIn !== null ? `<span class="tt-tag">${daysIn}d na vaga</span>` : ''}
        ${vencTag}
      </div>
    </div>`;
      }).join('');
      const _sfx0 = String(rows[0]?.material || '').slice(-3);
      const _allSame = rows.every(r => String(r.material || '').slice(-3) === _sfx0);
      const _unTT = (_allSame && rows[0]?.material) ? calcUnidades(rows[0].material, rows[0].nome, total) : null;
      _tt.innerHTML = `
    <div class="tt-pos">${esc(posicao)}</div>
    <div style="font-size:10px;color:var(--warning);margin-bottom:4px;font-weight:700">Total: ${fmt(total)} kg${_unTT !== null ? ' ≈ ' + _unTT.toLocaleString('pt-BR') + ' un' : ''}</div>
    ${itemsHtml}`;
      _showTT();
      moveTooltip(e);
    }

    function showPikDetailPopup(posicao, rows, cellEl) {
      if (_posicaoJaAberta(posicao)) return; // já existe bolha aberta para esta vaga
      const total = rows.reduce((s, r) => s + (r.estoque || 0), 0);
      const material = rows[0]?.material;
      const pesRows = material ? state.estoque.filter(r => r.material === material) : [];

      const pikItems = rows.map(r => {
        const dIn = r.data_entrada ? new Date(r.data_entrada) : null;
        const dVnc = r.data_vencimento ? new Date(r.data_vencimento) : null;
        const daysIn = dIn ? Math.floor((Date.now() - dIn.getTime()) / 86400000) : null;
        const days = daysUntil(dVnc);
        const cls = days === null ? '' : days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
        const vLabel = days === null ? '' : days < 0 ? `Vencido há ${Math.abs(days)}d` : days === 0 ? 'Vence hoje' : `Vence em ${days}d`;
        return `<div class="tt-item">
      <div class="tt-mat">${esc(r.material)}<button class="copy-btn" data-copy="${esc(r.material)}" title="Copiar">📋</button></div>
      <div class="tt-nome">${esc(r.nome)}</div>
      <div class="tt-row">
        <span class="tt-tag">${fmt(r.estoque)} kg</span>
        <span class="tt-tag tt-lote">Lote: ${esc(r.lote || '—')}${r.lote ? `<button class="copy-btn" data-copy="${esc(r.lote)}" title="Copiar">📋</button>` : ''}</span>
        ${daysIn !== null ? `<span class="tt-tag">${daysIn}d na vaga</span>` : ''}
        ${vLabel ? `<span class="tt-tag ${cls}">${vLabel}</span>` : ''}
      </div>
    </div>`;
      }).join('');

      const _sfxP0 = String(rows[0]?.material || '').slice(-3);
      const _allSameP = rows.every(r => String(r.material || '').slice(-3) === _sfxP0);
      const _unPopup = (_allSameP && rows[0]?.material) ? calcUnidades(rows[0].material, rows[0].nome, total) : null;
      const totalBadge = `<span style="font-size:11px;font-weight:800;color:var(--warning)">Total: ${fmt(total)} kg${_unPopup !== null ? ' ≈ ' + _unPopup.toLocaleString('pt-BR') + ' un' : ''}</span>`;

      let pesSection = '';
      if (pesRows.length) {
        // Ordenar por FEFO: vencimento mais próximo primeiro, sem vencimento por último
        const sorted = [...pesRows].sort((a, b) => {
          const da = a.data_vencimento ? a.data_vencimento.getTime() : Infinity;
          const db = b.data_vencimento ? b.data_vencimento.getTime() : Infinity;
          return da - db;
        });
        const MAX_PES = 10;
        const pesItems = sorted.slice(0, MAX_PES).map((r, i) => {
          const fefoNum = i + 1;
          const days = daysUntil(r.data_vencimento);
          const daysCls = days === null ? '' : days < 0 ? 'crit' : days <= 30 ? 'warn' : 'ok';
          const daysLbl = days === null ? '—'
            : days < 0 ? `${Math.abs(days)}d venc.`
              : days === 0 ? 'hoje'
                : `+${days}d`;
          return `<div class="pik-pes-row" data-fefo-pos="${esc(r.posicao)}">
        <span class="pik-pes-fefo">${fefoNum}º</span>
        <span class="pik-pes-pos">${esc(r.posicao)}</span>
        <span class="pik-pes-lote" title="${esc(r.lote || '')}">${esc(r.lote || '—')}${r.lote ? `<button class="copy-btn" data-copy="${esc(r.lote)}" title="Copiar" style="margin-left:3px;font-size:9px">📋</button>` : ''}</span>
        <span class="pik-pes-kg">${fmt(r.estoque)} kg</span>
        <span class="pik-pes-days ${daysCls}">${daysLbl}</span>
      </div>`;
        }).join('');
        const pesExtra = sorted.length > MAX_PES
          ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">+${sorted.length - MAX_PES} posições</div>` : '';
        pesSection = `<div class="pik-detail-section"><div class="pik-detail-title">📦 No estoque PES</div>${pesItems}${pesExtra}</div>`;
      } else if (state.estoque.length) {
        pesSection = `<div class="pik-detail-section"><div style="font-size:10px;color:var(--text-muted)">Sem dados PES para este material</div></div>`;
      }

      const popup = document.createElement('div');
      popup.className = 'detail-popup visible';
      popup.innerHTML = `
    <div class="detail-popup-header">
      <div class="tt-pos">${esc(posicao)}<button class="copy-btn" data-copy="${esc(posicao)}" title="Copiar">📋</button></div>
      <button class="detail-popup-close">✕</button>
    </div>
    <div style="margin-bottom:6px">${totalBadge}</div>
    ${pikItems}${pesSection}`;
      popup._posicao = posicao;
      document.body.appendChild(popup);
      popup.querySelector('.detail-popup-close').addEventListener('click', () => { _untrackPopup(popup); popup.remove(); });
      _trackPopup(popup);
      bindCopyButtons(popup);
      makeDraggable(popup);

      // Realçar vagas mencionadas no mapa
      const pesContainerPik = document.getElementById('estoque-content');
      const pikContainerPik = document.getElementById('picking-content');
      const mentionedCellsPik = [];
      if (pikContainerPik) {
        const pikCell = pikContainerPik.querySelector(`[data-posicao="${CSS.escape(posicao)}"]`);
        if (pikCell) mentionedCellsPik.push(pikCell);
      }
      if (pesContainerPik) {
        pesRows.forEach(r => {
          const cells = pesContainerPik.querySelectorAll(`[data-posicao="${CSS.escape(r.posicao)}"]`);
          if (cells.length === 1) mentionedCellsPik.push(cells[0]);
        });
      }
      bindPopupCellHighlights(popup, mentionedCellsPik);
      bindFefoRowHover(popup, pesContainerPik);

      const cRect = cellEl.getBoundingClientRect();
      const pw = popup.offsetWidth || 300;
      let x = cRect.right + 10, y = cRect.top;
      if (x + pw > window.innerWidth - 8) x = cRect.left - pw - 10;
      if (x < 8) x = 8;
      popup.style.left = x + 'px'; popup.style.top = y + 'px';
      requestAnimationFrame(() => {
        const ph = popup.offsetHeight;
        let ny = y;
        if (ny + ph > window.innerHeight - 8) ny = window.innerHeight - ph - 8;
        if (ny < 8) ny = 8;
        popup.style.top = ny + 'px';
      });
    }

    /* ═══════════════════════════════════════════════════
     * PIK CORREDOR COM NÍVEIS (PE, PD)
     * ═══════════════════════════════════════════════════ */
    function _buildPikNivelBody(id, byPos, posTotal, familyFilter) {
      const prefix = id + '-';
      const allPositions = Object.keys(byPos).filter(p => p.startsWith(prefix));
      if (!allPositions.length) return null;

      const nivelSet = new Set();
      let maxSlot = 0;
      allPositions.forEach(pos => {
        const parts = pos.split('-');
        nivelSet.add(parseInt(parts[1], 10));
        const s = parseInt(parts[2], 10);
        if (s > maxSlot) maxSlot = s;
      });
      const niveis = [...nivelSet].sort((a, b) => b - a);
      const allSlots = Array.from({ length: maxSlot }, (_, i) => i + 1);

      const corrThr = getCorredorThreshold(id);
      let cntOk = 0, cntWarn = 0, cntZero = 0, cntData = 0;
      allPositions.forEach(pos => {
        cntData++;
        const t = posTotal[pos] || 0;
        if (t === 0) cntZero++;
        else if (t <= corrThr) cntWarn++;
        else cntOk++;
      });

      const axisHtml = `<div class="pik-axis-row" style="padding-left:36px">${allSlots.map(s => {
        const lbl = (s % 10 === 0 || s === 1 || s === allSlots[allSlots.length - 1])
          ? String(s).padStart(3, '0') : '';
        return `<div class="pik-axis-cell">${lbl}</div>`;
      }).join('')}</div>`;

      const levelsHtml = niveis.map(nivel => {
        const nivelStr = String(nivel).padStart(2, '0');
        const cells = allSlots.map(slot => {
          const slotStr = String(slot).padStart(3, '0');
          const pos = `${id}-${nivelStr}-${slotStr}`;
          const posRows = byPos[pos];
          if (!posRows || !posRows.length) {
            return `<div class="pik-cell no-data"><span class="pik-cell-slot" style="font-size:8px">${slotStr}</span></div>`;
          }
          const total = posTotal[pos] || 0;
          const status = total === 0 ? 'pik-zero' : total <= corrThr ? 'pik-warn' : 'pik-ok';
          const kgTxt = total > 0 ? fmt(total) : '∅';
          const famMatch = !familyFilter.size || posRows.some(r => familyFilter.has(getMaterialFamily(r.material)));
          const dimCls = !famMatch ? ' pik-dim' : '';
          const hiCls = (familyFilter.size && famMatch) ? ' highlight-match' : '';
          const rowsData = esc(JSON.stringify(posRows.map(r => ({
            material: r.material, nome: r.nome, lote: r.lote, estoque: r.estoque, posicao: r.posicao,
            data_entrada: r.data_entrada ? r.data_entrada.toISOString() : null,
            data_vencimento: r.data_vencimento ? r.data_vencimento.toISOString() : null,
          }))));
          return `<div class="pik-cell ${status}${dimCls}${hiCls}" data-posicao="${esc(pos)}" data-rows="${rowsData}">
        <span class="pik-cell-slot" style="font-size:8px">${slotStr}</span>
        <span class="pik-cell-kg">${kgTxt}</span>
      </div>`;
        }).join('');
        return `<div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
      <div style="width:32px;flex-shrink:0;font-size:10px;font-weight:700;color:var(--text-muted);font-family:monospace;text-align:right;padding-right:4px">N${nivel}</div>
      <div class="pik-row">${cells}</div>
    </div>`;
      }).join('');

      return { axisHtml, levelsHtml, cntData, cntWarn, cntZero, corrThr };
    }

    function buildPikNivelCombinedSection(ids, byPos, posTotal, familyFilter) {
      const parts = ids.map(id => ({ id, data: _buildPikNivelBody(id, byPos, posTotal, familyFilter) }))
        .filter(p => p.data !== null);
      if (!parts.length) return '';

      const totalData = parts.reduce((s, p) => s + p.data.cntData, 0);
      const totalWarn = parts.reduce((s, p) => s + p.data.cntWarn, 0);
      const totalZero = parts.reduce((s, p) => s + p.data.cntZero, 0);

      const pillTotal = `<span class="pill total">${totalData} vaga${totalData !== 1 ? 's' : ''}</span>`;
      const pillWarn = totalWarn ? `<span class="pill warn">${totalWarn} atenção</span>` : '';
      const pillCrit = totalZero ? `<span class="pill crit">⚠ ${totalZero} crítico${totalZero > 1 ? 's' : ''}</span>` : '';

      const colsHtml = parts.map(p => {
        const thrPill = `<span class="pik-thr-pill" onclick="event.stopPropagation();editCorredorThresh('${esc(p.id)}',this)">≤ <span class="pik-thr-val">${p.data.corrThr}</span> kg</span>`;
        return `<div style="flex:0 0 auto;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border-sub)">
        <span style="font-family:monospace;font-weight:700;font-size:13px">${esc(p.id)}</span>
        ${thrPill}
      </div>
      ${p.data.axisHtml}
      ${p.data.levelsHtml}
    </div>`;
      }).join('<div style="width:24px;flex:0 0 24px;border-left:1px solid var(--border-sub);margin:0 4px"></div>');

      const title = parts.map(p => p.id).join(' / ');
      return `<div class="mapa-section">
    <div class="mapa-section-head open" onclick="toggleMapaSection(this)">
      <span class="mapa-chevron">▶</span>
      <span class="mapa-section-title" style="font-family:monospace">${esc(title)}</span>
      <div class="mapa-section-pills">${pillTotal}${pillWarn}${pillCrit}</div>
    </div>
    <div class="mapa-section-body open" style="overflow-x:auto">
      <div style="display:flex;align-items:flex-start;gap:0">${colsHtml}</div>
    </div>
  </div>`;
    }

    function attachPikEvents(container) {
      if (container._pikEventsAttached) return;
      container._pikEventsAttached = true;
      container.addEventListener('click', e => {
        const cell = e.target.closest('.pik-cell[data-rows]');
        if (!cell) return;
        e.stopPropagation();
        hideTooltip();
        showPikDetailPopup(cell.dataset.posicao, JSON.parse(cell.dataset.rows), cell);
      });
      container.addEventListener('mouseover', e => {
        const cell = e.target.closest('.pik-cell[data-rows]');
        if (!cell || cell._ttBound) return;
        cell._ttBound = true;
        showPikTooltip(e, cell.dataset.posicao, JSON.parse(cell.dataset.rows));
        const onLeave = () => { hideTooltip(); cell.removeEventListener('mouseleave', onLeave); cell._ttBound = false; };
        cell.addEventListener('mouseleave', onLeave);
      });
    }

    /* ═══════════════════════════════════════════════════
     * TABELA DE TODAS AS VAGAS PIK
     * ═══════════════════════════════════════════════════ */
    function setPikVagasSort(col) {
      if (state.pikVagasSort.col === col) {
        state.pikVagasSort.dir = state.pikVagasSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.pikVagasSort = { col, dir: col === 'total' ? 'desc' : 'asc' };
      }
      renderPicking();
    }

    function buildPikVagasTable(byPos, posTotal) {
      const { col, dir } = state.pikVagasSort;
      const allPos = Object.keys(byPos);
      if (!allPos.length) return '';

      // Montar linhas
      let rows = allPos.map(pos => {
        const posRows = byPos[pos];
        const total = posTotal[pos] || 0;
        const mat = posRows[0]?.material || '';
        const nome = posRows[0]?.nome || '';
        const lote = posRows[0]?.lote || '—';
        const corredor = pos.split('-')[0] || pos;
        const thr = getFamilyThreshold(mat);
        const status = total === 0 ? 'zero' : total <= thr ? 'warn' : 'ok';
        return { pos, mat, nome, lote, total, corredor, status, posRows };
      });

      // Ordenar
      rows.sort((a, b) => {
        let va, vb;
        if (col === 'total') { va = a.total; vb = b.total; }
        else if (col === 'corredor') { va = a.corredor; vb = b.corredor; }
        else if (col === 'status') {
          const ord = { zero: 0, warn: 1, ok: 2 };
          va = ord[a.status]; vb = ord[b.status];
        } else { va = normStr(a.pos); vb = normStr(b.pos); }
        if (typeof va === 'number') return dir === 'asc' ? va - vb : vb - va;
        if (va < vb) return dir === 'asc' ? -1 : 1;
        if (va > vb) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      const arw = c => c === col ? (dir === 'asc' ? ' ▲' : ' ▼') : '';
      const thBtn = (c, label) =>
        `<th style="cursor:pointer;user-select:none" onclick="setPikVagasSort('${c}')">${label}${arw(c)}</th>`;

      const rowsHtml = rows.map(r => {
        const statusBadge = r.status === 'zero'
          ? `<span class="pill crit" style="font-size:10px">∅ vazia</span>`
          : r.status === 'warn'
            ? `<span class="pill warn" style="font-size:10px">⚠ baixo</span>`
            : `<span class="pill ok" style="font-size:10px">ok</span>`;
        const sgTag = r.mat ? softgelTag(r.mat, r.nome, r.total, '') : '';
        return `<tr>
      <td><span class="vaga-code" style="font-size:11px">${esc(r.pos)}</span></td>
      <td style="font-size:11px;color:var(--text-muted)">${esc(r.corredor)}</td>
      <td>${r.mat ? `<code style="font-size:11px;color:var(--text-sec)">${esc(r.mat)}</code><button class="copy-btn" data-copy="${esc(r.mat)}" title="Copiar">📋</button>` : '<span style="color:var(--text-muted);font-size:11px">— vazia —</span>'}</td>
      <td><span class="nome-material" title="${esc(r.nome)}">${esc(r.nome || '—')}</span></td>
      <td><span class="${estoqueClass(r.total, r.mat)}">${r.total > 0 ? fmt(r.total) + ' kg' : '—'}</span>${sgTag ? ` ${sgTag}` : ''}</td>
      <td><span style="font-family:monospace;font-size:11px">${esc(r.lote)}</span></td>
      <td>${statusBadge}</td>
    </tr>`;
      }).join('');

      return `<div class="pik-vagas-section">
    <div class="pik-vagas-head">
      <span class="pik-vagas-title">📋 Todas as Vagas PIK (${rows.length})</span>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead><tr>
        ${thBtn('posicao', 'Posição')}
        ${thBtn('corredor', 'Corredor')}
        <th>Material</th><th>Nome</th>
        ${thBtn('total', 'Peso (kg)')}
        <th>Lote</th>
        ${thBtn('status', 'Status')}
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div></div>
  </div>`;
    }

    function renderPicking() {
      const container = document.getElementById('picking-content');
      renderPikFamFilterPills();
      if (!state.picking.length) {
        container.innerHTML = `<div class="prompt-filtro"><div class="prompt-ico">🏷️</div><p>Nenhum dado de picking importado.</p><small>Importe o CSV do PIK acima.</small></div>`;
        return;
      }
      const f = getPickingFilters();

      // Total por posição PIK (todos os lotes)
      const posTotal = {};
      state.picking.forEach(r => { posTotal[r.posicao] = (posTotal[r.posicao] || 0) + (r.estoque || 0); });

      // byPos para acesso rápido
      const byPos = {};
      state.picking.forEach(r => { if (!byPos[r.posicao]) byPos[r.posicao] = []; byPos[r.posicao].push(r); });

      // Detectar corredores dinâmicos pela planilha PIK
      function detectMaxSlot(prefix) {
        const slots = Object.keys(byPos)
          .filter(p => new RegExp(`^${prefix}-\\d+-(\\d+)$`).test(p))
          .map(p => parseInt(p.split('-')[2], 10))
          .filter(n => !isNaN(n));
        return slots.length ? Math.max(...slots) : 0;
      }
      const pgMaxSlot = detectMaxSlot('PG');
      const peMaxSlot = detectMaxSlot('PE');
      const pdMaxSlot = detectMaxSlot('PD');

      const corridores = [
        { id: 'PF', maxSlot: 56, duplo: true },
        ...(pgMaxSlot > 0 ? [{ id: 'PG', maxSlot: pgMaxSlot, duplo: false }] : []),
        { id: 'PH', maxSlot: 51, duplo: true },
        { id: 'PI', maxSlot: 17, duplo: false },
        ...(peMaxSlot > 0 ? [{ id: 'PE', maxSlot: peMaxSlot, duplo: true }] : []),
        ...(pdMaxSlot > 0 ? [{ id: 'PD', maxSlot: pdMaxSlot, duplo: true }] : []),
      ];

      const hasPE = peMaxSlot > 0, hasPD = pdMaxSlot > 0;
      const mapHtml = [
        ...corridores
          .filter(cfg => cfg.id !== 'PE' && cfg.id !== 'PD')
          .map(cfg => buildPikCorredorSection(cfg, byPos, posTotal, f.families)),
        (hasPE || hasPD) ? buildPikNivelCombinedSection(
          [...(hasPE ? ['PE'] : []), ...(hasPD ? ['PD'] : [])],
          byPos, posTotal, f.families
        ) : '',
      ].join('');

      const vagasHtml = buildPikVagasTable(byPos, posTotal);

      container.innerHTML = `<div class="pik-map-wrap">${mapHtml}</div>` + vagasHtml;
      attachPikEvents(container);
    }

    /* ═══════════════════════════════════════════════════
     * PIK SUB-TABS
     * ═══════════════════════════════════════════════════ */
    const _pikSubtabs = ['corredores', 'planejamento'];

    function setPikSubtab(id) {
      document.querySelectorAll('#pik-subtabs .pes-subtab').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'pik-tab-' + id);
      });
      _pikSubtabs.forEach(k => {
        const el = document.getElementById('pik-pane-' + k);
        if (el) el.style.display = k === id ? '' : 'none';
      });
    }

    /* ═══════════════════════════════════════════════════
     * TABS
     * ═══════════════════════════════════════════════════ */
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name));
    }

    /* ═══════════════════════════════════════════════════
     * RENDER ALL
     * ═══════════════════════════════════════════════════ */
    function renderAll() {
      renderDashboard();
      renderPesView();
      renderPicking();
    }

    // Init
    renderAll();
  </script>
</body>
