<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argos — Estoque & Picking</title>
  <style>
    :root {
      --bg: #111519;
      --bg-card: #1c2228;
      --bg-hover: #222c35;
      --border: #2d3d4d;
      --border-sub: #1e2c38;
      --accent: #0a84ff;
      --accent-dim: #082040;
      --success: #30914c;
      --success-dim: #0d2018;
      --warning: #f0ab00;
      --warning-dim: #2a1f00;
      --danger: #e9420a;
      --danger-dim: #2d1005;
      --text: #e6edf3;
      --text-sec: #ffffff;
      --text-muted: #5a6e7f;
      --radius: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.4px;
    }

    .logo em {
      color: var(--text-sec);
      font-style: normal;
      font-weight: 400;
      font-size: 13px;
      margin-left: 4px;
    }

    .header-sep {
      flex: 1;
    }

    /* ── FAMILY THRESHOLD PILLS (header) ── */
    .fam-thresh-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .fam-thresh-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
      user-select: none;
    }

    .fam-thresh-pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .fam-thresh-pill.editing {
      border-color: var(--accent);
    }

    .fam-thresh-sep {
      color: var(--text-muted);
      font-weight: 400;
      margin: 0 1px;
    }

    .fam-thresh-val {
      color: var(--accent);
      font-family: monospace;
    }

    .fam-thresh-inp {
      width: 36px;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      outline: none;
      padding: 0;
      font-family: monospace;
    }

    /* ── FAMILY FILTER PILLS (PIK) ── */
    .pik-fam-filter-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .fam-filter-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 13px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }

    .fam-filter-pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .fam-filter-pill.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── MAIN ── */
    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 16px 40px;
    }

    /* ── DASHBOARD ── */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 7px 16px 7px 10px;
    }

    .stat-icon {
      font-size: 17px;
      flex-shrink: 0;
      line-height: 1;
    }

    .stat-body {
      display: flex;
      flex-direction: column;
    }

    .stat.blue {
      background: rgba(26, 45, 74, .55);
      border-color: rgba(88, 166, 255, .35);
    }

    .stat.green {
      background: rgba(18, 35, 24, .55);
      border-color: rgba(63, 185, 80, .35);
    }

    .stat.yellow {
      background: rgba(45, 34, 0, .55);
      border-color: rgba(210, 153, 34, .35);
    }

    .stat.red {
      background: rgba(61, 26, 25, .55);
      border-color: rgba(248, 81, 73, .35);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .stat-val {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.15;
    }

    .stat.blue .stat-val {
      color: var(--accent);
    }

    .stat.green .stat-val {
      color: var(--success);
    }

    .stat.yellow .stat-val {
      color: var(--warning);
    }

    .stat.red .stat-val {
      color: var(--danger);
    }

    .stat-sub {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── IMPORT ── */
    .import-row {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .import-card {
      flex: 1;
      min-width: 230px;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .import-card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .import-card.loaded {
      border-style: solid;
      border-color: var(--success);
    }

    .import-card.loaded:hover {
      background: var(--success-dim);
    }

    .import-icon {
      font-size: 22px;
      flex-shrink: 0;
    }

    .import-info {
      flex: 1;
      min-width: 0;
    }

    .import-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .import-desc {
      font-size: 11px;
      color: var(--text-sec);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .import-card.loaded .import-desc {
      color: var(--success);
    }

    .import-hint {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-sub);
      border-radius: var(--radius);
      padding: 8px 12px;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .import-hint strong {
      color: var(--text-sec);
    }

    input[type="file"] {
      display: none;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab {
      padding: 9px 18px;
      cursor: pointer;
      color: var(--text-sec);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-weight: 500;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color .12s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 11px;
      color: var(--text-sec);
    }

    .tab.active .tab-badge {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    /* ── VIEW TOGGLE ── */
    .view-toggle {
      display: flex;
      margin-bottom: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
      width: fit-content;
    }

    .view-btn {
      padding: 5px 16px;
      border-radius: calc(var(--radius) - 2px);
      border: none;
      background: transparent;
      color: var(--text-sec);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }

    .view-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .view-btn:not(.active):hover {
      color: var(--text);
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .fg label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .fg select,
    .fg input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 12px;
      outline: none;
    }

    .fg select:focus,
    .fg input:focus {
      border-color: var(--accent);
    }

    .fg select {
      min-width: 120px;
    }

    .fg input[type="text"] {
      min-width: 150px;
    }

    .fg input[type="number"] {
      min-width: 80px;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sec);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      align-self: flex-end;
      transition: all .15s;
    }

    .btn-clear:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* ── TABLE ── */
    .results-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .tbl-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .tbl-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: rgba(0, 0, 0, .3);
      padding: 9px 14px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-sec);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover {
      color: var(--text);
    }

    thead th.asc::after {
      content: ' ↑';
      color: var(--accent);
    }

    thead th.desc::after {
      content: ' ↓';
      color: var(--accent);
    }

    tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-sub);
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--bg-hover);
    }

    tbody tr.row-crit {
      background: rgba(248, 81, 73, .07) !important;
    }

    tbody tr.row-warn {
      background: rgba(210, 153, 34, .07) !important;
    }

    tbody tr.row-sem-end {
      background: rgba(88, 166, 255, .06) !important;
    }

    /* ── BADGES ── */
    .badge-deposito {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .badge-deposito.sexp {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .25);
    }

    .badge-deposito.almox {
      background: rgba(63, 185, 80, .12);
      color: var(--success);
      border: 1px solid rgba(63, 185, 80, .25);
    }

    .badge-deposito.other {
      background: var(--bg);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .badge-tipo {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-tipo.pes {
      background: rgba(88, 166, 255, .1);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .2);
    }

    .badge-tipo.pik {
      background: rgba(210, 153, 34, .1);
      color: var(--warning);
      border: 1px solid rgba(210, 153, 34, .2);
    }

    .badge-tipo.other {
      background: var(--bg);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .vaga-code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-sec);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-sub);
    }

    .nivel-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
    }

    .estoque-val {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .estoque-val.ok {
      color: var(--success);
    }

    .estoque-val.warn {
      color: var(--warning);
    }

    .estoque-val.crit {
      color: var(--danger);
    }

    .date-ok {
      color: var(--text-sec);
      font-size: 12px;
    }

    .date-warn {
      color: var(--warning);
      font-weight: 600;
      font-size: 12px;
    }

    .date-crit {
      color: var(--danger);
      font-weight: 600;
      font-size: 12px;
    }

    .nome-material {
      color: var(--text-sec);
      font-size: 12px;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── PICKING GROUPS ── */
    .alert-criticos {
      background: var(--danger-dim);
      border: 1px solid rgba(248, 81, 73, .3);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-criticos .alert-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .alert-criticos .alert-text {
      font-size: 13px;
      color: var(--danger);
    }

    .alert-criticos strong {
      font-weight: 700;
    }

    .familia-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .familia-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }

    .familia-head:hover {
      background: var(--bg-hover);
    }

    .familia-chevron {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform .15s;
    }

    .familia-head.open .familia-chevron {
      transform: rotate(90deg);
    }

    .familia-name {
      font-weight: 600;
      font-size: 13px;
    }

    .familia-pills {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill.total {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
    }

    .pill.crit {
      background: var(--danger-dim);
      border: 1px solid rgba(248, 81, 73, .3);
      color: var(--danger);
    }

    .pill.warn {
      background: var(--warning-dim);
      border: 1px solid rgba(210, 153, 34, .3);
      color: var(--warning);
    }

    .pill.ok {
      background: var(--success-dim);
      border: 1px solid rgba(63, 185, 80, .3);
      color: var(--success);
    }

    .familia-body {
      display: none;
    }

    .familia-body.open {
      display: block;
    }

    .familia-body .tbl-scroll {
      border-top: 1px solid var(--border-sub);
    }

    /* ── PROMPT / EMPTY ── */
    .prompt-filtro {
      text-align: center;
      padding: 48px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .prompt-filtro .prompt-ico {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .prompt-filtro p {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 4px;
    }

    .prompt-filtro small {
      font-size: 12px;
      color: var(--text-muted);
    }

    .empty {
      text-align: center;
      padding: 52px 20px;
      color: var(--text-muted);
    }

    .empty .empty-ico {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty p {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .empty small {
      font-size: 12px;
    }

    /* ══════════════════════════════════════
       MAPA VISUAL DE PORTA PALLET
    ══════════════════════════════════════ */

    /* Seção do corredor */
    .mapa-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .mapa-section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }

    .mapa-section-head:hover {
      background: var(--bg-hover);
    }

    .mapa-chevron {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform .15s;
    }

    .mapa-section-head.open .mapa-chevron {
      transform: rotate(90deg);
    }

    .mapa-section-title {
      font-weight: 700;
      font-size: 15px;
    }

    .mapa-section-pills {
      display: flex;
      gap: 7px;
      margin-left: auto;
      flex-wrap: wrap;
      align-items: center;
    }

    .mapa-section-body {
      display: none;
      padding: 16px 18px;
      overflow-x: auto;
    }

    .mapa-section-body.open {
      display: block;
    }

    /* Legenda */
    .mapa-legenda {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legenda-dot {
      display: block;
      width: 12px;
      height: 12px;
      min-width: 12px;
      max-width: 12px;
      min-height: 12px;
      max-height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      flex-grow: 0;
    }

    .legenda-dot.ok {
      background: rgba(63, 185, 80, .5);
      border: 1px solid rgba(63, 185, 80, .6);
    }

    .legenda-dot.warn {
      background: rgba(210, 153, 34, .5);
      border: 1px solid rgba(210, 153, 34, .6);
    }

    .legenda-dot.crit {
      background: rgba(248, 81, 73, .5);
      border: 1px solid rgba(248, 81, 73, .6);
    }

    .legenda-dot.empty {
      background: var(--bg-hover);
      border: 1px solid var(--border);
    }

    /* Grade do corredor */
    .corredor-grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: max-content;
    }

    .corredor-row {
      display: flex;
      align-items: stretch;
      gap: 5px;
    }

    .corredor-nivel-label {
      width: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
      letter-spacing: .5px;
    }

    /* Célula porta pallet */
    .pallet-cell {
      width: 144px;
      min-height: 96px;
      flex-shrink: 0;
      border-radius: 7px;
      border: 1px solid var(--border);
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      cursor: default;
      position: relative;
      transition: transform .1s, box-shadow .1s;
    }

    .pallet-cell:not(.empty):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, .5);
      z-index: 3;
    }

    .pallet-cell.empty {
      background: rgba(255, 255, 255, .018);
      border-style: dashed;
      border-color: var(--border-sub);
      cursor: default;
    }

    .pallet-cell.ok {
      background: rgba(63, 185, 80, .08);
      border-color: rgba(63, 185, 80, .28);
    }

    .pallet-cell.warn {
      background: rgba(210, 153, 34, .1);
      border-color: rgba(210, 153, 34, .35);
    }

    .pallet-cell.crit {
      background: rgba(248, 81, 73, .1);
      border-color: rgba(248, 81, 73, .35);
    }

    .pallet-cell.highlight-match {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .pallet-pos {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
      letter-spacing: .5px;
      margin-bottom: 3px;
    }

    .pallet-mat {
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pallet-nome {
      font-size: 10px;
      color: var(--text-sec);
      margin-top: 2px;
      flex: 1;
      overflow: hidden;
      line-height: 1.35;
      max-height: 2.7em;
    }

    .pallet-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 6px;
      gap: 4px;
    }

    .pallet-estoque {
      font-size: 10px;
      font-weight: 700;
      font-family: monospace;
    }

    .pallet-cell.ok .pallet-estoque {
      color: var(--success);
    }

    .pallet-cell.warn .pallet-estoque {
      color: var(--warning);
    }

    .pallet-cell.crit .pallet-estoque {
      color: var(--danger);
    }

    .pallet-venc {
      font-size: 9px;
      font-weight: 600;
      text-align: right;
      line-height: 1.2;
    }

    .pallet-cell.ok .pallet-venc {
      color: rgba(63, 185, 80, .7);
    }

    .pallet-cell.warn .pallet-venc {
      color: var(--warning);
    }

    .pallet-cell.crit .pallet-venc {
      color: var(--danger);
    }

    .pallet-multi-badge {
      position: absolute;
      top: 5px;
      right: 5px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
    }

    .pallet-empty-label {
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      margin: auto;
      font-style: italic;
    }

    /* Rótulos de posição no eixo X */
    .corredor-slot-axis {
      display: flex;
      gap: 5px;
      padding-left: calc(42px + 5px);
      margin-bottom: 4px;
    }

    .corredor-slot-label {
      width: 144px;
      flex-shrink: 0;
      text-align: center;
      font-size: 9px;
      color: var(--text-muted);
      font-family: monospace;
      font-weight: 600;
    }

    /* ── TOOLTIP ── */
    .pallet-tooltip {
      display: none;
      position: fixed;
      z-index: 1000;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      min-width: 240px;
      max-width: 320px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .6);
      pointer-events: none;
    }

    .tt-pos {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      font-family: monospace;
      margin-bottom: 8px;
    }

    .tt-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border-sub);
    }

    .tt-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .tt-mat {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      color: var(--text);
    }

    .tt-nome {
      font-size: 11px;
      color: var(--text-sec);
      margin-top: 2px;
    }

    .tt-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .tt-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
    }

    .tt-tag.ok {
      color: var(--success);
      border-color: rgba(63, 185, 80, .3);
    }

    .tt-tag.warn {
      color: var(--warning);
      border-color: rgba(210, 153, 34, .3);
    }

    .tt-tag.crit {
      color: var(--danger);
      border-color: rgba(248, 81, 73, .3);
    }

    /* ── CORAN-021 ── */
    .coran-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .coran-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }

    .coran-head:hover {
      background: var(--bg-hover);
    }

    .coran-head.open .mapa-chevron {
      transform: rotate(90deg);
    }

    .coran-title {
      font-weight: 700;
      font-size: 15px;
    }

    .coran-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .coran-body {
      display: none;
    }

    .coran-body.open {
      display: block;
    }

    /* ── MAT CARD GRID (CORAN-021 / abas especiais) ── */
    .mat-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
      padding: 14px 0;
    }

    .mat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      transition: border-color .15s, background .12s;
    }

    .mat-card:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }

    .mat-card.ok   { border-left-color: rgba(63, 185, 80, .6); }
    .mat-card.warn { border-left-color: rgba(210, 153, 34, .6); }
    .mat-card.crit { border-left-color: rgba(248, 81, 73, .6); }
    .mat-card.highlight-match { outline: 1px solid var(--accent); }

    .mc-code-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mc-code {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      letter-spacing: .3px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mc-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .mc-estoque-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 3px;
    }

    .mc-kg {
      font-size: 13px;
      font-weight: 700;
      font-family: monospace;
    }

    .mc-kg.ok   { color: var(--success); }
    .mc-kg.warn { color: var(--warning); }
    .mc-kg.crit { color: var(--danger); }

    .mc-lote-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-sec);
    }

    .mc-lote-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .mc-parado { margin-top: 1px; }

    .mc-venc {
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .mc-venc.ok   { color: var(--success); }
    .mc-venc.warn { color: var(--warning); }
    .mc-venc.crit { color: var(--danger); }

    .mat-card-group { margin-bottom: 16px; }

    .mat-card-group-header {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border-sub);
      margin-bottom: 4px;
    }

    .coran-sem-end-badge {
      background: rgba(88, 166, 255, .1);
      border: 1px solid rgba(88, 166, 255, .25);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── VISÃO COMPACTA ── */
    .compact-rack {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .compact-level {
      display: flex;
      align-items: stretch;
      gap: 2px;
    }

    .compact-nivel-label {
      width: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
    }

    .compact-cell {
      flex: 1;
      min-width: 22px;
      height: 42px;
      border-radius: 4px;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      gap: 1px;
      position: relative;
      transition: filter .1s, transform .1s;
    }

    .compact-cell:not(.empty):hover {
      filter: brightness(1.4);
      transform: scaleY(1.06);
      z-index: 2;
    }

    .compact-cell.empty {
      min-height: 42px;
      background: rgba(255, 255, 255, .02);
      border-style: dashed;
      border-color: var(--border-sub);
      cursor: default;
    }

    .compact-cell.ok {
      background: rgba(63, 185, 80, .14);
      border-color: rgba(63, 185, 80, .35);
    }

    .compact-cell.warn {
      background: rgba(210, 153, 34, .14);
      border-color: rgba(210, 153, 34, .35);
    }

    .compact-cell.crit {
      background: rgba(248, 81, 73, .14);
      border-color: rgba(248, 81, 73, .35);
    }

    .compact-cell.highlight-match {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .compact-cell-slot {
      font-size: 9px;
      color: var(--text);
      font-family: monospace;
      font-weight: 700;
      line-height: 1.4;
      background: rgba(0, 0, 0, .35);
      border-radius: 2px;
      padding: 0 2px;
    }

    .compact-cell-kg {
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
    }

    .compact-cell.ok .compact-cell-kg {
      color: var(--success);
    }

    .compact-cell.warn .compact-cell-kg {
      color: var(--warning);
    }

    .compact-cell.crit .compact-cell-kg {
      color: var(--danger);
    }

    .compact-slot-axis {
      display: flex;
      gap: 2px;
      padding-left: 32px;
      margin-bottom: 4px;
    }

    .compact-slot-label {
      flex: 1;
      min-width: 22px;
      text-align: center;
      font-size: 7px;
      color: var(--text-muted);
      font-family: monospace;
      font-weight: 600;
    }

    /* ── VISÃO 3D ISO ── */
    .iso-scene {
      perspective: 1100px;
      overflow-x: auto;
      padding: 28px 24px 24px;
    }

    .iso-rack {
      transform-style: preserve-3d;
      transform: rotateX(28deg) rotateY(-14deg);
      display: inline-flex;
      flex-direction: column;
      gap: 8px;
    }

    .iso-level {
      display: flex;
      align-items: center;
      gap: 4px;
      transform-style: preserve-3d;
      transform: translateZ(var(--iso-z, 0px));
    }

    .iso-nivel-label {
      width: 28px;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
      text-align: right;
      padding-right: 4px;
    }

    .iso-cell {
      width: 52px;
      height: 38px;
      flex-shrink: 0;
      border-radius: 5px;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 2px;
      transition: filter .12s;
      backface-visibility: hidden;
    }

    .iso-cell:not(.empty):hover {
      filter: brightness(1.5);
    }

    .iso-cell.empty {
      background: rgba(255, 255, 255, .025);
      border-style: dashed;
      border-color: rgba(48, 54, 61, .6);
      cursor: default;
    }

    .iso-cell.ok {
      background: rgba(63, 185, 80, .18);
      border-color: rgba(63, 185, 80, .5);
    }

    .iso-cell.warn {
      background: rgba(210, 153, 34, .18);
      border-color: rgba(210, 153, 34, .5);
    }

    .iso-cell.crit {
      background: rgba(248, 81, 73, .18);
      border-color: rgba(248, 81, 73, .5);
    }

    .iso-cell.highlight-match {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .iso-cell-pos {
      font-size: 7px;
      color: var(--text-muted);
      font-family: monospace;
      line-height: 1;
    }

    .iso-cell-kg {
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
    }

    .iso-cell.ok .iso-cell-kg {
      color: var(--success);
    }

    .iso-cell.warn .iso-cell-kg {
      color: var(--warning);
    }

    .iso-cell.crit .iso-cell-kg {
      color: var(--danger);
    }

    .iso-cell.empty .iso-cell-pos {
      color: rgba(72, 79, 88, .4);
    }

    /* Sub-toggle do mapa */
    .mapa-sub-toggle {
      margin-top: 6px;
    }

    /* ── MINI MAPA ── */
    .mini-mapa-wrapper {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      margin: 4px 0;
    }

    .mini-mapa-corredor {
      flex: 1;
      min-width: 260px;
    }

    .mini-mapa-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .mini-mapa-grid-wrap {
      display: flex;
      align-items: flex-start;
    }

    .mini-mapa-level-labels {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding-top: 20px;
    }

    .mini-mapa-nivel-label {
      height: 16px;
      width: 26px;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 3px;
    }

    .mini-mapa-grid {
      flex: 1;
      min-width: 0;
    }

    .mini-mapa-slot-axis {
      display: flex;
      gap: 1px;
      height: 16px;
      margin-bottom: 4px;
    }

    .mini-mapa-slot-label {
      width: 16px;
      flex-shrink: 0;
      height: 16px;
      line-height: 16px;
      text-align: center;
      font-size: 7px;
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
    }

    .mini-mapa-rows {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .mini-mapa-row {
      display: flex;
      gap: 1px;
    }

    .mini-cell {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
      cursor: pointer;
      transition: transform .08s, filter .08s;
    }

    .mini-cell:not(.empty):hover {
      transform: scale(1.5);
      z-index: 5;
      filter: brightness(1.3);
    }

    .mini-cell.empty {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(48, 54, 61, .4);
      cursor: default;
    }

    .mini-cell.ok {
      background: rgba(63, 185, 80, .55);
    }

    .mini-cell.warn {
      background: rgba(210, 153, 34, .55);
    }

    .mini-cell.crit {
      background: rgba(248, 81, 73, .55);
    }

    .mini-cell.highlight-match {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* ── VISÃO EXPANDIDA ── */
    .expandida-rack {
      display: flex;
      flex-direction: column;
    }

    .expandida-shelf-bar {
      height: 10px;
      background: #161c22;
      border-top: 3px solid #2d3540;
      display: flex;
      align-items: center;
      padding-left: 46px;
      flex-shrink: 0;
    }

    .expandida-shelf-label {
      font-size: 8px;
      color: var(--text-muted);
      font-family: monospace;
      font-weight: 700;
      padding-left: 4px;
    }

    .expandida-row {
      display: flex;
      flex-shrink: 0;
    }

    .expandida-nivel-label {
      width: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: monospace;
      border-right: 4px solid #21262d;
      background: rgba(22, 27, 34, .6);
    }

    .expandida-cells {
      display: flex;
    }

    .expandida-cell {
      width: 110px;
      min-height: 72px;
      flex-shrink: 0;
      padding: 20px 8px 6px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      border-right: 3px solid #21262d;
      transition: filter .12s;
      position: relative;
      overflow: hidden;
    }

    .expandida-cell:not(.empty):hover {
      filter: brightness(1.3);
      z-index: 2;
    }

    .expandida-cell.empty {
      background: rgba(255, 255, 255, .012);
      cursor: default;
    }

    .expandida-cell.empty:hover {
      filter: none;
    }

    .expandida-cell.ok {
      background: rgba(63, 185, 80, .1);
      border-bottom: 3px solid rgba(63, 185, 80, .6);
    }

    .expandida-cell.warn {
      background: rgba(210, 153, 34, .12);
      border-bottom: 3px solid rgba(210, 153, 34, .6);
    }

    .expandida-cell.crit {
      background: rgba(248, 81, 73, .12);
      border-bottom: 3px solid rgba(248, 81, 73, .6);
    }

    .mat-emoji {
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 14px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .compact-cell .mat-emoji {
      font-size: 9px;
      top: 1px;
      right: 2px;
    }

    /* ── FEFO BADGE ── */
    .fefo-badge {
      position: absolute;
      top: 2px;
      left: 2px;
      background: rgba(255, 255, 255, .92);
      color: #111;
      border-radius: 3px;
      font-size: 7px;
      font-weight: 800;
      padding: 0 2px;
      line-height: 13px;
      min-width: 13px;
      text-align: center;
      font-family: monospace;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }

    .expandida-cell .fefo-badge {
      font-size: 9px;
      line-height: 15px;
      min-width: 15px;
      top: 3px;
      left: 3px;
      padding: 0 3px;
    }

    /* ── MAT HIGHLIGHT ── */
    #estoque-content .compact-cell,
    #estoque-content .expandida-cell,
    #estoque-content .n1-row {
      transition: opacity .15s;
    }

    #estoque-content.has-mat-hl .compact-cell:not(.mat-match),
    #estoque-content.has-mat-hl .expandida-cell:not(.mat-match),
    #estoque-content.has-mat-hl .n1-row:not(.mat-match) {
      opacity: .25;
    }

    .mat-match {
      outline: 2px solid rgba(255, 255, 255, .85) !important;
      outline-offset: 1px;
      position: relative;
      z-index: 3;
    }

    .tt-tag.pik {
      color: var(--warning);
      border-color: rgba(210, 153, 34, .3);
    }

    .tt-tag.pik-none {
      color: var(--text-muted);
    }

    .expandida-cell.highlight-match {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .expandida-cell.focused {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      animation: pulse-focus .5s ease 2;
    }

    @keyframes pulse-focus {

      0%,
      100% {
        filter: brightness(1);
      }

      50% {
        filter: brightness(1.6);
      }
    }

    .exp-pos {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-sec);
      font-family: monospace;
      text-align: center;
      background: rgba(0, 0, 0, .3);
      border-radius: 2px;
      padding: 0 3px;
      display: inline-block;
    }

    .exp-nome {
      font-size: 9px;
      color: var(--text-sec);
      flex: 1;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .exp-kg {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
    }

    .expandida-cell.ok .exp-kg {
      color: var(--success);
    }

    .expandida-cell.warn .exp-kg {
      color: var(--warning);
    }

    .expandida-cell.crit .exp-kg {
      color: var(--danger);
    }

    .exp-days {
      font-size: 8px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .expandida-cell.warn .exp-days {
      color: var(--warning);
    }

    .expandida-cell.crit .exp-days {
      color: var(--danger);
    }

    .expandida-cell.ok .exp-days {
      color: rgba(63, 185, 80, .7);
    }

    .expandida-floor-bar {
      height: 8px;
      background: #161c22;
      border-top: 3px solid #2d3540;
      flex-shrink: 0;
      margin-left: 42px;
    }

    .expandida-slot-axis {
      display: flex;
      padding-left: 46px;
      margin-bottom: 4px;
      min-width: max-content;
    }

    .expandida-slot-label {
      width: 110px;
      flex-shrink: 0;
      text-align: center;
      font-size: 9px;
      color: var(--text-muted);
      font-family: monospace;
      font-weight: 600;
    }

    /* ── DETAIL POPUP ── */
    .detail-popup {
      display: none;
      position: fixed;
      z-index: 500;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      min-width: 260px;
      max-width: 420px;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .7);
      user-select: none;
    }

    .detail-popup.dragging {
      box-shadow: 0 24px 56px rgba(0, 0, 0, .85);
      opacity: .97;
    }

    .detail-popup.visible {
      display: block;
    }

    .detail-popup-close {
      flex-shrink: 0;
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 6px;
      transition: color .1s;
    }

    .detail-popup-close:hover {
      color: var(--text);
    }

    .detail-popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d1117;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      margin: -14px -14px 12px -14px;
      padding: 8px 8px 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      cursor: grab;
    }

    .detail-popup-header:active {
      cursor: grabbing;
    }

    .detail-popup-header .tt-pos {
      margin-bottom: 0;
    }

    .fefo-popup-badge {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 800;
      font-family: monospace;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── COPY BUTTON ── */
    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 3px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
      vertical-align: middle;
      transition: color .1s;
      flex-shrink: 0;
      opacity: .55;
    }

    .copy-btn:hover {
      color: var(--accent);
      opacity: 1;
    }

    /* ── LOTE BADGE ── */
    .tt-lote {
      background: rgba(88, 166, 255, .07);
      border-color: rgba(88, 166, 255, .22) !important;
      color: var(--accent) !important;
      font-family: monospace;
    }

    /* ── PIK MAP ── */
    .pik-map-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .pik-cell {
      width: 38px;
      min-height: 50px;
      flex-shrink: 0;
      border-radius: 4px;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      position: relative;
      transition: filter .1s, transform .1s;
    }

    .pik-cell:not(.no-data):not(.empty-slot):hover {
      filter: brightness(1.45);
      transform: scale(1.08);
      z-index: 5;
    }

    .pik-cell.no-data {
      background: rgba(255, 255, 255, .03);
      border-color: var(--border-sub);
      border-style: dashed;
      cursor: default;
    }

    .pik-cell.pik-zero {
      background: rgba(248, 81, 73, .1);
      border-color: rgba(248, 81, 73, .3);
      cursor: pointer;
    }

    .pik-cell.pik-warn {
      background: rgba(210, 153, 34, .14);
      border-color: rgba(210, 153, 34, .38);
      cursor: pointer;
    }

    .pik-cell.pik-ok {
      background: rgba(63, 185, 80, .12);
      border-color: rgba(63, 185, 80, .32);
      cursor: pointer;
    }

    .pik-cell.pik-dim {
      opacity: .18;
      pointer-events: none;
    }

    .pik-cell.highlight-match {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .pik-cell-slot {
      font-size: 10px;
      font-family: monospace;
      color: var(--text-muted);
      font-weight: 600;
      line-height: 1.4;
    }

    .pik-cell-kg {
      font-size: 10px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }

    .pik-cell.pik-ok .pik-cell-kg {
      color: var(--success);
    }

    .pik-cell.pik-warn .pik-cell-kg {
      color: var(--warning);
    }

    .pik-cell.pik-zero .pik-cell-kg {
      color: var(--danger);
    }

    .pik-row {
      display: flex;
      gap: 3px;
      min-width: max-content;
    }

    .pik-axis-row {
      display: flex;
      gap: 3px;
      min-width: max-content;
    }

    .pik-axis-cell {
      width: 38px;
      flex-shrink: 0;
      text-align: center;
      font-size: 7px;
      font-family: monospace;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .pik-side-label {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 700;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 2px 0;
      opacity: .65;
    }

    .pik-corredor-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      min-width: max-content;
    }

    .pik-corredor-strip-lbl {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .pik-corredor-strip-line {
      flex: 1;
      height: 1px;
      background: rgba(48, 54, 61, .9);
      min-width: 20px;
    }

    .pik-detail-section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border-sub);
    }

    .pik-detail-title {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .pik-pes-row {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      gap: 6px;
      font-size: 10px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border-sub);
      align-items: center;
    }

    .pik-pes-row:last-child {
      border-bottom: none;
    }

    .pik-pes-fefo {
      font-size: 9px;
      font-weight: 800;
      font-family: monospace;
      background: rgba(255, 255, 255, .1);
      border-radius: 2px;
      padding: 0 3px;
      color: var(--text);
      white-space: nowrap;
    }

    .pik-pes-pos {
      font-family: monospace;
      color: var(--accent);
      white-space: nowrap;
    }

    .pik-pes-lote {
      font-family: monospace;
      color: var(--text-sec);
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255, 255, 255, .05);
      border-radius: 3px;
      padding: 0 4px;
    }

    .pik-thr-pill {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sec);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      user-select: none;
      white-space: nowrap;
    }

    .pik-thr-pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .pik-thr-pill.editing {
      border-color: var(--accent);
    }

    .pik-thr-val {
      color: var(--accent);
      font-family: monospace;
    }

    .pik-thr-inp {
      width: 34px;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      outline: none;
      padding: 0;
      font-family: monospace;
    }

    .pik-pes-kg {
      font-weight: 700;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }

    .pik-pes-days {
      font-size: 9px;
      white-space: nowrap;
      text-align: right;
    }

    .pik-pes-days.ok {
      color: var(--success);
    }

    .pik-pes-days.warn {
      color: var(--warning);
    }

    .pik-pes-days.crit {
      color: var(--danger);
    }

    .fefo-current-row {
      background: rgba(255, 255, 255, .08);
      border-radius: 3px;
    }

    .fefo-current-row .pik-pes-pos {
      color: var(--text) !important;
      font-weight: 800;
    }

    .pik-pes-row[data-fefo-pos] {
      cursor: default;
      border-radius: 3px;
    }

    .pik-pes-row[data-fefo-pos]:hover {
      background: rgba(255, 255, 255, .05);
    }

    /* Realce sutil: vagas mencionadas numa bolha aberta */
    .popup-mentioned {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .3) !important;
      position: relative;
      z-index: 2;
    }

    /* Realce brilhante ao hover numa linha FEFO da bolha */
    .popup-hover-hl {
      outline: 2px solid rgba(255, 255, 255, .92) !important;
      outline-offset: 1px;
      box-shadow: 0 0 12px rgba(255, 255, 255, .22) !important;
      position: relative;
      z-index: 4;
      filter: brightness(1.35) !important;
    }

    /* ── N1 PRÉ-RESSUPRIMENTO ── */
    .n1-corredor-block {
      margin-bottom: 14px;
    }

    .n1-corredor-block:last-child {
      margin-bottom: 0;
    }

    .n1-corredor-block-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .n1-sides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .n1-side-header {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 700;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 5px 0 3px 0;
      opacity: .7;
    }

    .n1-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .n1-row-wrap {
      display: flex;
      flex-direction: column;
    }

    .n1-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 4px;
      min-height: 24px;
      border: 1px solid transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter .1s;
    }

    .n1-row.expanded {
      border-radius: 4px 4px 0 0;
    }

    .n1-row:not(.empty):hover {
      filter: brightness(1.3);
    }

    .n1-row.ok {
      background: rgba(63, 185, 80, .1);
      border-color: rgba(63, 185, 80, .3);
    }

    .n1-row.warn {
      background: rgba(210, 153, 34, .12);
      border-color: rgba(210, 153, 34, .35);
    }

    .n1-row.crit {
      background: rgba(248, 81, 73, .12);
      border-color: rgba(248, 81, 73, .35);
    }

    .n1-row.highlight-match {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .n1-row-num {
      font-size: 9px;
      color: var(--text-muted);
      min-width: 14px;
      text-align: right;
      flex-shrink: 0;
      font-family: monospace;
      font-weight: 600;
    }

    .n1-row-pos {
      font-size: 9px;
      font-weight: 700;
      font-family: monospace;
      color: var(--text-muted);
      min-width: 68px;
      flex-shrink: 0;
    }

    .n1-row-kg {
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      min-width: 52px;
      text-align: right;
    }

    .n1-row.ok .n1-row-kg {
      color: var(--success);
    }

    .n1-row.warn .n1-row-kg {
      color: var(--warning);
    }

    .n1-row.crit .n1-row-kg {
      color: var(--danger);
    }

    .n1-row-days {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 44px;
      text-align: right;
    }

    .n1-row.warn .n1-row-days {
      color: var(--warning);
    }

    .n1-row.crit .n1-row-days {
      color: var(--danger);
    }

    .n1-fefo {
      font-size: 9px;
      font-weight: 800;
      font-family: monospace;
      background: rgba(255, 255, 255, .85);
      color: #111;
      border-radius: 2px;
      padding: 0 3px;
      line-height: 14px;
      flex-shrink: 0;
    }

    /* ── N1 ACCORDION EXPAND ── */
    .n1-expand {
      display: none;
      border: 1px solid var(--border-sub);
      border-top: none;
      border-radius: 0 0 4px 4px;
      background: var(--bg);
      padding: 6px 8px;
      margin-bottom: 2px;
    }

    .n1-expand.open {
      display: block;
    }

    .n1-expand-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-sub);
    }

    .n1-expand-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .n1-expand-swatch {
      width: 14px;
      height: 14px;
      min-width: 14px;
      max-width: 14px;
      min-height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .n1-expand-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .n1-expand-mat {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      color: var(--text);
    }

    .n1-expand-nome {
      font-size: 11px;
      color: var(--text-sec);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .n1-expand-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .n1-expand-tag {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
    }

    .n1-expand-tag.ok {
      color: var(--success);
      border-color: rgba(63, 185, 80, .3);
    }

    .n1-expand-tag.warn {
      color: var(--warning);
      border-color: rgba(210, 153, 34, .3);
    }

    .n1-expand-tag.crit {
      color: var(--danger);
      border-color: rgba(248, 81, 73, .3);
    }

    .n1-expand-tag.pik {
      color: var(--warning);
      border-color: rgba(210, 153, 34, .3);
    }

    .n1-expand-tag.pik-none {
      color: var(--text-muted);
      opacity: .5;
    }

    /* ── CORREDOR DOIS LADOS ── */
    .corredor-duplo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: max-content;
    }

    .corredor-nivel-pair {
      display: flex;
      flex-direction: column;
    }

    .corredor-strip {
      height: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .corredor-strip-lbl {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: .2px;
    }

    .corredor-strip-line {
      flex: 1;
      height: 1px;
      background: rgba(48, 54, 61, .9);
      min-width: 12px;
    }

    .corredor-side-label {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 700;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 0 2px 4px;
      opacity: .7;
    }

    /* ── COMPACT IMPORT BUTTONS ── */
    .import-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px dashed var(--border);
      background: var(--bg-card);
      color: var(--text-sec);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .import-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    .import-btn.loaded {
      border-style: solid;
      border-color: var(--success);
      color: var(--success);
      background: rgba(63, 185, 80, .08);
    }

    .ib-status {
      font-size: 10px;
      opacity: .75;
      font-weight: 400;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .depot-badge-tab {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      font-family: monospace;
      margin-left: 4px;
      vertical-align: middle;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .3);
    }

    /* ── SEARCH AUTOCOMPLETE ── */
    .search-suggest-wrap {
      position: relative;
    }

    .search-suggest {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 300px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 200;
      margin-top: 3px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .6);
      overflow: hidden;
    }

    .search-suggest.open {
      display: block;
    }

    .suggest-group {
      padding: 2px 0;
    }

    .suggest-group+.suggest-group {
      border-top: 1px solid var(--border-sub);
    }

    .suggest-group-label {
      padding: 5px 12px 3px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .suggest-item {
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-sec);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border-sub);
    }

    .suggest-item:last-child {
      border-bottom: none;
    }

    .suggest-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .suggest-mat {
      font-family: monospace;
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .suggest-nome {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .suggest-tag {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .suggest-tag.crit {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(248, 81, 73, .3);
    }

    .suggest-tag.low {
      background: var(--warning-dim);
      color: var(--warning);
      border: 1px solid rgba(210, 153, 34, .3);
    }

    /* ── PES SUB-TABS ── */
    .pes-subtabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 10px 0 6px;
      margin-bottom: 2px;
    }

    .pes-subtab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
      padding: 5px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .pes-subtab:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .pes-subtab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── SPECIAL TAB CONTROLS ── */
    .tab-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 0 10px;
    }

    .tab-ctrl-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
      padding: 4px 11px;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .tab-ctrl-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .tab-ctrl-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab-ctrl-sep {
      color: var(--border);
      font-size: 14px;
    }

    .tab-ctrl-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      cursor: pointer;
    }

    .tab-ctrl-select:focus {
      border-color: var(--accent);
      outline: none;
    }

    /* ── SOFTGEL UNITS TAG ── */
    .softgel-un {
      font-size: 9px;
      color: var(--text-muted);
      font-style: italic;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(88, 166, 255, .07);
      border: 1px solid rgba(88, 166, 255, .15);
    }

    .tt-tag.softgel-un {
      font-size: 10px;
    }

    /* ── PIK VAGAS TABLE ── */
    .pik-vagas-section {
      margin-top: 18px;
    }

    .pik-vagas-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 8px;
      border-top: 1px solid var(--border);
    }

    .pik-vagas-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .pik-vagas-sort {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .pik-sort-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
      padding: 3px 10px;
      border-radius: var(--radius);
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .pik-sort-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .pik-sort-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Grupos no modo Organizada */
    .special-group-header {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: .5px;
      padding: 6px 4px 3px;
      border-top: 1px solid var(--border-sub);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .special-group-header:first-child {
      border-top: none;
      margin-top: 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .stat-val {
        font-size: 15px;
      }

      .header {
        padding: 0 12px;
      }

      .main {
        padding: 12px 10px 32px;
      }
    }
  </style>
</head>

<body>

  <div class="pallet-tooltip" id="palletTooltip"></div>
  <div class="detail-popup" id="detailPopup">
    <button class="detail-popup-close" onclick="closeDetailPopup()">✕</button>
    <div id="detailPopupBody"></div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">Argos</div>
    <label class="import-btn" id="cardEstoque" for="fileEstoque">📦 PES<span class="ib-status"
        id="descEstoque"></span></label>
    <label class="import-btn" id="cardPicking" for="filePicking">🏷️ PIK<span class="ib-status"
        id="descPicking"></span></label>
    <input type="file" id="fileEstoque" accept=".csv,.txt">
    <input type="file" id="filePicking" accept=".csv,.txt">
    <div class="header-sep"></div>
    <div class="fam-thresh-wrap" id="famThreshWrap" style="display:none"></div>
  </header>

  <main class="main">

    <!-- DASHBOARD + IMPORT INLINE -->
    <section class="dashboard">
      <div class="stat blue">
        <div class="stat-icon">📦</div>
        <div class="stat-body">
          <div class="stat-label">Materiais PES</div>
          <div class="stat-val" id="d-total-mat">—</div>
          <div class="stat-sub" id="d-total-mat-sub">Aguardando importação</div>
        </div>
      </div>
      <div class="stat green">
        <div class="stat-icon">📍</div>
        <div class="stat-body">
          <div class="stat-label">Posições PES</div>
          <div class="stat-val" id="d-vagas">—</div>
          <div class="stat-sub" id="d-vagas-sub">No estoque</div>
        </div>
      </div>
      <div class="stat yellow">
        <div class="stat-icon">🏷️</div>
        <div class="stat-body">
          <div class="stat-label">Itens PIK</div>
          <div class="stat-val" id="d-picking">—</div>
          <div class="stat-sub" id="d-picking-sub">Aguardando importação</div>
        </div>
      </div>
      <div class="stat red">
        <div class="stat-icon">⚠️</div>
        <div class="stat-body">
          <div class="stat-label">Vagas Críticas PIK</div>
          <div class="stat-val" id="d-criticas">—</div>
          <div class="stat-sub" id="d-criticas-sub">No picking</div>
        </div>
      </div>
    </section>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" data-tab="estoque" onclick="switchTab('estoque')">
        Estoque PES <span class="tab-badge" id="badge-estoque">0</span><span id="badge-deposito-tab"></span>
      </div>
      <div class="tab" data-tab="picking" onclick="switchTab('picking')">
        Picking PIK <span class="tab-badge" id="badge-picking">0</span>
      </div>
    </div>

    <!-- TAB: ESTOQUE PES -->
    <div class="tab-pane active" id="pane-estoque">

      <!-- Sub-tabs dinâmicas (JK / CORAN-021 / AJUSTE / outras) -->
      <div id="pes-subtabs" class="pes-subtabs"></div>

      <!-- Toggle de visualização (só visível na aba JK) -->
      <div class="view-toggle mapa-sub-toggle" id="mapa-view-toggle">
        <button class="view-btn" id="btn-mapa-preress" onclick="setMapaView('preress')">📋 Pré-Ressuprimento</button>
        <button class="view-btn active" id="btn-mapa-compacta" onclick="setMapaView('compacta')">▦ Compacta</button>
        <button class="view-btn" id="btn-mapa-expandida" onclick="setMapaView('expandida')">▤ Expandida</button>
      </div>

      <!-- Filtros -->
      <div class="filters" id="pes-filters">
        <div class="fg">
          <label>Vencimento</label>
          <select id="f-vencimento" onchange="renderPesView()">
            <option value="">Todos</option>
            <option value="proximos">Próximos 30 dias</option>
            <option value="vencidos">Vencidos</option>
          </select>
        </div>
        <div class="fg search-suggest-wrap">
          <label>Material / Nome</label>
          <input type="text" id="f-material" placeholder="Buscar..." oninput="_dRenderPes();_dSuggest(this.value)"
            onfocus="renderSuggest(this.value)" onblur="closeSuggest()">
          <div class="search-suggest" id="suggestDropdown"></div>
        </div>
        <button class="btn-clear" onclick="clearEstoqueFilters()">Limpar</button>
      </div>

      <div class="results-meta" id="meta-estoque"></div>
      <div id="estoque-content"></div>
    </div>

    <!-- TAB: PICKING PIK -->
    <div class="tab-pane" id="pane-picking">
      <!-- PIK Sub-tabs -->
      <div class="pes-subtabs" id="pik-subtabs" style="margin-top:6px">
        <button class="pes-subtab active" id="pik-tab-corredores"
          onclick="setPikSubtab('corredores')">Corredores</button>
        <button class="pes-subtab" id="pik-tab-planejamento"
          onclick="setPikSubtab('planejamento')">Planejamento</button>
      </div>
      <!-- Pane: Planejamento -->
      <div id="pik-pane-planejamento" style="display:none">
        <div class="prompt-filtro">
          <div class="prompt-ico">📋</div>
          <p>Área de Planejamento</p>
          <small>Em desenvolvimento.</small>
        </div>
      </div>
      <!-- Pane: Corredores -->
      <div id="pik-pane-corredores">
        <div class="pik-fam-filter-wrap" id="pikFamFilterWrap"></div>
        <div id="picking-content">
          <div class="prompt-filtro">
            <div class="prompt-ico">🏷️</div>
            <p>Nenhum dado de picking importado.</p>
            <small>Importe o CSV do PIK acima.</small>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script>
    /* ═══════════════════════════════════════════════════
     * STATE
     * ═══════════════════════════════════════════════════ */
    const state = {
      estoque: [],
      picking: [],
      familyThresholds: { tint: 10, aroma: 10, sg150: 10, sg360: 10, sg900: 10, po: 10, corante: 10 },
      corredorThresholds: {},
      pikFamilyFilter: new Set(),
      mapaView: 'compacta',
      expandedFocus: null,
      pesSubtab: 'jk',
      pesTabSort: 'mais_velho',
      pesTabModo: 'normal',
      pesTabFiltroVenc: '',
      pikVagasSort: { col: 'posicao', dir: 'asc' },
    };

    /* ═══════════════════════════════════════════════════
     * UTILS
     * ═══════════════════════════════════════════════════ */
    function normStr(s) {
      return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    }
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmt(n) {
      if (n === null || n === undefined) return '—';
      if (Number.isInteger(n)) return n.toLocaleString('pt-BR');
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
    }
    function numVal(v) {
      if (v === null || v === undefined || v === '') return 0;
      return parseFloat(String(v).replace(',', '.')) || 0;
    }
    function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
    const _pikByMaterial = new Map();
    const _matInfoCache = new Map();
    const _posDataMap = new Map();
    let _suggestCrit = [], _suggestLow = [];
    let _ttVisible = false;
    const _dRenderPes = debounce(() => renderPesView(), 150);
    const _dRenderPik = debounce(() => renderPicking(), 150);
    const _dSuggest = debounce((v) => renderSuggest(v), 120);
    let _fefoCache = null, _fefoDirty = true;

    /* ═══════════════════════════════════════════════════
     * CSV PARSING
     * ═══════════════════════════════════════════════════ */
    function detectSep(text) {
      const line = text.split('\n')[0];
      return (line.split(';').length > line.split(',').length) ? ';' : ',';
    }
    function parseCSVLine(line, sep) {
      const vals = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; continue; }
        if (c === sep && !inQ) { vals.push(cur); cur = ''; } else cur += c;
      }
      vals.push(cur); return vals;
    }
    function findHeaderRow(lines) {
      for (let i = 0; i < Math.min(8, lines.length); i++) {
        if (normStr(lines[i]).includes('material')) return i;
      }
      return 0;
    }
    function parseCSV(text) {
      const sep = detectSep(text);
      const lines = text.trim().split(/\r?\n/);
      const hIdx = findHeaderRow(lines);
      const headers = parseCSVLine(lines[hIdx], sep).map(h => h.trim());
      return lines.slice(hIdx + 1).filter(l => l.trim()).map(line => {
        const vals = parseCSVLine(line, sep);
        const raw = {};
        headers.forEach((h, i) => { raw[h] = (vals[i] || '').trim(); });
        return normalizeRow(raw);
      }).filter(r => r.material);
    }

    /* ═══════════════════════════════════════════════════
     * NORMALIZAÇÃO DE COLUNAS SAP
     * ═══════════════════════════════════════════════════ */
    function normalizeRow(raw) {
      const nr = {};
      for (const [k, v] of Object.entries(raw)) nr[normStr(k)] = v;
      const lookup = alts => { for (const a of alts) { const v = nr[a]; if (v !== undefined && v !== '') return v; } return ''; };
      const posicao = lookup(['posicao no deposito', 'posicao no dep.', 'posicao']);
      const parsedPos = parsePos(posicao);
      const _mat = lookup(['material']).replace(/^'/, '');
      const _lote = lookup(['lote', 'lotes']).replace(/^'/, '');
      const _nome = lookup(['texto breve material', 'texto breve do material', 'texto breve']);
      return {
        material: _mat,
        lote: _lote,
        nome: _nome,
        tipo_deposito: lookup(['tipo de deposito', 'tipo deposito']),
        posicao,
        nivel: parsedPos ? parsedPos.nivel : extractNivelSimple(posicao),
        corredor: parsedPos ? parsedPos.letra : extractCorredor(posicao),
        slot: parsedPos ? parsedPos.slot : 0,
        nivelStr: parsedPos ? parsedPos.nivelStr : '',
        slotStr: parsedPos ? parsedPos.slotStr : '',
        estoque: numVal(lookup(['estoque disponivel', 'estoque disp.', 'estoque'])),
        deposito: lookup(['deposito']),
        data_entrada: parseDate(lookup(['data da entrada de mercadorias', 'data entrada de mercadorias', 'data entrada'])),
        data_vencimento: parseDate(lookup(['data do vencimento', 'data vencimento'])),
        _normSearch: normStr(_mat + ' ' + _nome + ' ' + _lote),
        _normPosicao: normStr(posicao),
      };
    }

    /* ═══════════════════════════════════════════════════
     * PARSING DE POSIÇÃO: LETRA-NIVEL-SLOT  (ex: J-01-003)
     * ═══════════════════════════════════════════════════ */
    function parsePos(posicao) {
      if (!posicao) return null;
      const m = posicao.match(/^([A-Za-z]+)-(\d+)-(\d+)$/);
      if (!m) return null;
      return {
        letra: m[1].toUpperCase(),
        nivel: parseInt(m[2], 10),
        slot: parseInt(m[3], 10),
        nivelStr: m[2],
        slotStr: m[3],
      };
    }
    function extractNivelSimple(posicao) {
      if (!posicao) return '';
      const parts = posicao.split('-');
      if (parts.length < 3) return '';
      const v = parseInt(parts[parts.length - 1], 10);
      return isNaN(v) ? '' : v;
    }
    function extractCorredor(posicao) {
      if (!posicao) return '(Sem posição)';
      return posicao.split('-')[0] || '(Sem posição)';
    }

    /* ═══════════════════════════════════════════════════
     * DATAS
     * ═══════════════════════════════════════════════════ */
    function parseDate(s) {
      if (!s) return null; s = s.trim();
      let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
      m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
      m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
      return null;
    }
    function fmtDate(d) { return d ? d.toLocaleDateString('pt-BR') : '—'; }
    function daysUntil(d) {
      if (!d) return null;
      const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
      return Math.floor((d - hoje) / 86400000);
    }
    function daysAgo(d) {
      if (!d) return null;
      const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
      return Math.floor((hoje - d) / 86400000);
    }
    function vencClass(d) {
      const days = daysUntil(d);
      if (days === null) return 'date-ok';
      if (days < 0) return 'date-crit';
      if (days <= 30) return 'date-warn';
      return 'date-ok';
    }
    function rowVencClass(d) {
      const days = daysUntil(d);
      if (days === null) return '';
      if (days < 0) return 'row-crit';
      if (days <= 30) return 'row-warn';
      return '';
    }

    /* Status de uma lista de rows (para a célula do mapa) */
    function rowsStatus(rows) {
      if (!rows || !rows.length) return 'empty';
      let hasCrit = false, hasWarn = false;
      for (const r of rows) {
        const days = daysUntil(r.data_vencimento);
        if (r.estoque <= 0) { hasCrit = true; break; }
        if (days !== null && days < 0) { hasCrit = true; break; }
        if (days !== null && days <= 30) hasWarn = true;
      }
      if (hasCrit) return 'crit';
      if (hasWarn) return 'warn';
      return 'ok';
    }

    /* ═══════════════════════════════════════════════════
     * BADGES HTML
     * ═══════════════════════════════════════════════════ */
    function badgeDeposito(dep) {
      const cls = dep === 'SEXP' ? 'sexp' : dep === 'ALMOX' ? 'almox' : 'other';
      return dep ? `<span class="badge-deposito ${cls}">${esc(dep)}</span>` : '—';
    }
    function badgeTipo(tipo) {
      const t = (tipo || '').toUpperCase();
      const cls = t === 'PES' ? 'pes' : t === 'PIK' ? 'pik' : 'other';
      return tipo ? `<span class="badge-tipo ${cls}">${esc(tipo)}</span>` : '—';
    }
    function estoqueClass(v, material) {
      const threshold = getFamilyThreshold(material);
      if (v <= threshold) return 'estoque-val crit';
      if (v <= threshold * 2) return 'estoque-val warn';
      return 'estoque-val ok';
    }

    /* ═══════════════════════════════════════════════════
     * FAMÍLIAS & UNIDADES POR CÓDIGO
     * ═══════════════════════════════════════════════════ */
    const UNIT_PESOS = {
      '584': 0.150, '700': 0.360, '751': 0.900,
      '593': 0.144, '787': 0.060, '670': 0.036,
      '596': 0.120, '349': 0.500,
    };
    const AROMA_PESOS = {
      'TORTA DE LIMAO': 0.412, 'PIPOCA CARAMELIZADA': 0.336,
      'FRUTAS VERMELHAS': 0.406, 'DOCE DE LEITE': 0.414,
      'LEITE CONDENSADO': 0.414, 'LICOR DE CREME': 0.410,
      'MILHO VERDE': 0.372, 'PAO DE MEL': 0.406,
      'CARAMELO': 0.415, 'PISTACHE': 0.415,
      'CACHACA': 0.410, 'LARANJA': 0.414,
      'AVELA': 0.406, 'MENTA': 0.446,
      'WHISKY': 0.410, 'TRUFA': 0.388,
      'LIMAO': 0.388, 'CAFE': 0.403,
    };
    // Ordenado por tamanho do nome (maior primeiro) para evitar match parcial
    const AROMA_PESOS_SORTED = Object.entries(AROMA_PESOS).sort((a, b) => b[0].length - a[0].length);
    const AROMA_DEFAULT = 0.360;

    const FAMILY_DEFS = [
      { key: 'tint', label: 'Tint', suffixes: ['593'] },
      { key: 'aroma', label: 'Aroma', suffixes: ['595'] },
      { key: 'sg150', label: 'Softgel 150', suffixes: ['584'] },
      { key: 'sg360', label: 'Softgel 360', suffixes: ['700'] },
      { key: 'sg900', label: 'Softgel 900', suffixes: ['751'] },
      { key: 'po', label: 'Pós', suffixes: ['787', '670', '349'] },
      { key: 'corante', label: 'Corantes Líq.', suffixes: ['596'] },
    ];

    function getMaterialFamily(material) {
      const suffix = String(material || '').slice(-3);
      for (const f of FAMILY_DEFS) { if (f.suffixes.includes(suffix)) return f.key; }
      return null;
    }
    function getFamilyThreshold(material) {
      const fk = getMaterialFamily(material);
      return fk ? (state.familyThresholds[fk] ?? 10) : 10;
    }
    function getCorredorThreshold(corridorId) {
      return state.corredorThresholds[corridorId] ?? 12;
    }
    function editCorredorThresh(corridorId, el) {
      if (el.classList.contains('editing')) return;
      el.classList.add('editing');
      const valEl = el.querySelector('.pik-thr-val');
      const cur = getCorredorThreshold(corridorId);
      const inp = document.createElement('input');
      inp.type = 'number'; inp.min = 0; inp.step = 0.5; inp.value = cur;
      inp.className = 'pik-thr-inp';
      valEl.replaceWith(inp);
      inp.focus(); inp.select();
      const commit = () => {
        el.classList.remove('editing');
        const v = Math.max(0, parseFloat(inp.value) || 0);
        state.corredorThresholds[corridorId] = v;
        const span = document.createElement('span');
        span.className = 'pik-thr-val'; span.textContent = v;
        inp.replaceWith(span);
        renderPicking();
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') {
          el.classList.remove('editing');
          const span = document.createElement('span');
